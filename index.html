  ["mental health world","Mental Health Awareness 💚\n• Mental health is as important as physical health!\n• Common issues: Anxiety, depression, stress, loneliness\n• In India: 150+ million people need mental healthcare\n• Stigma: Major barrier to seeking help — let's break it!\n• Resources: iCall (India), Vandrevala Foundation helpline: 1860-2662-345\n• Talk to someone — you're never alone 💕"],
  ["covid 19 pandemic","COVID-19 Pandemic 🦠\n• Disease: SARS-CoV-2 coronavirus\n• First detected: December 2019, Wuhan, China\n• WHO declared pandemic: 11 March 2020\n• Global deaths: ~7 million (officially)\n• Vaccines developed: Record time (~11 months)\n• Covaxin: India's own vaccine (Bharat Biotech)\n• Changed the world: Remote work, e-learning, supply chains disrupted"],
  ["renewable energy world","Renewable Energy — The Future 🌞\n• Types: Solar, Wind, Hydro, Geothermal, Biomass\n• Solar: Fastest growing — cost dropped 90% in 10 years!\n• India's target: 500 GW renewable by 2030\n• China: Largest renewable energy producer (solar + wind)\n• The future is clean energy — fossil fuels being phased out\n• India is top 5 in solar installed capacity globally"],
  ["water crisis world","Global Water Crisis 💧\n• 2.2 billion people lack access to safe drinking water\n• By 2050: ~5 billion may face water scarcity\n• India: 21 major cities to run out of groundwater by 2030 (NITI Aayog)\n• Cause: Overuse, pollution, climate change\n• Solutions: Rainwater harvesting, drip irrigation, water recycling\n• 22 March: World Water Day\n• 'Water is the new oil' — most valuable resource of the future"],
  ["space tourism world","Space Tourism 🚀\n• First space tourist: Dennis Tito (USA, 2001) — paid $20 million\n• Companies: SpaceX (Musk), Blue Origin (Bezos), Virgin Galactic (Branson)\n• Cost: $250,000+ for a short suborbital flight\n• Future: Hotels in space (Axiom Space planning commercial ISS hotel)\n• India: Gaganyaan mission — first Indian astronauts to space (2025 target)"],
  ["electric vehicles world","Global EV Revolution ⚡\n• Global EV sales: 14 million+ in 2023\n• Leading country: China (60% of global EV sales)\n• Leading companies: Tesla, BYD, Tata, Mahindra\n• India: 1.5 million EVs sold in 2023 (growing rapidly)\n• Goal: 30% EV in India by 2030\n• Benefits: Zero emissions, lower running cost, reduce oil imports"],
  ["india china relations world","India-China Relations 🗺️\n• Border dispute: Line of Actual Control (LAC) — no demarcated border\n• Galwan Valley clash (June 2020): 20 Indian soldiers martyred\n• Trade: China is India's largest trading partner (~$125 billion)\n• India's response: Banned 200+ Chinese apps (TikTok, PUBG)\n• Relations: Complex — trade partners but strategic rivals\n• Arunachal Pradesh: China calls it 'South Tibet' — India rejects this claim"],
  ["world heritage sites","UNESCO World Heritage Sites 🏛️\n• Total worldwide: 1,199 sites (as of 2024)\n• India: 42 World Heritage Sites\n• India's Cultural WHS: Taj Mahal, Red Fort, Ajanta Caves, Hampi, Khajuraho\n• India's Natural WHS: Kaziranga, Sundarbans, Western Ghats, Great Himalayan NP\n• India's Intangible WHS: Yoga, Vedic chanting, Ramlila, Kumbh Mela, Satriya dance\n• Latest Indian addition: Hoysala temples, Karnataka (2023)"],
  ["world press freedom","Press Freedom World 📰\n• Press Freedom Index: Published by Reporters Without Borders (RSF)\n• Most free: Norway, Finland, Denmark, Sweden\n• India's rank: 159/180 (2024) — very low\n• Issues in India: Journalist arrests, internet shutdowns, media ownership\n• Why free press matters: Democracy needs informed citizens\n• Fake news: A growing global problem — verify before sharing!"],
],

fun_facts: [
  ["king of jungle","The lion is called the King of the Jungle 🦁\n• Actually lives in grasslands (savannas), not jungles!\n• Males have distinctive manes\n• Live in groups called 'prides'\n• Female lions do most of the hunting"],
  ["bird that cannot fly","Several birds cannot fly 🐧\n• Penguin — uses wings as flippers to swim\n• Ostrich — world's largest bird; runs at 70 km/h!\n• Emu — native to Australia\n• Kiwi — national bird of New Zealand\n• Cassowary — most dangerous bird in the world"],
  ["longest neck animal","The giraffe has the longest neck 🦒\n• Neck length: up to 1.8 metres\n• Total height: up to 5.5 metres (tallest land animal!)\n• Despite the long neck, giraffes have only 7 neck vertebrae — same as humans!\n• Tongue: 45 cm long and dark blue!"],
  ["largest animal world","The Blue Whale is the largest animal 🐋\n• Length: up to 30 metres\n• Weight: up to 180,000 kg\n• Heart: size of a small car\n• Loudest animal — calls can be heard 1,600 km away!\n• Largest animal EVER to exist on Earth"],
  ["fastest land animal","The cheetah is the fastest land animal 🐆\n• Top speed: ~120 km/h (75 mph)\n• Can accelerate from 0 to 100 km/h in just 3 seconds!\n• Built for speed: lightweight body, long legs, flexible spine\n• Found in: Africa and parts of Iran"],
  ["which planet has rings","Saturn is famous for its rings 🪐\n• Rings made of: ice and rock particles\n• Saturn has 7 major ring groups\n• Other planets also have rings: Jupiter, Uranus, Neptune\n• Saturn could float on water — it's less dense than water!"],
  ["largest planet","Jupiter is the largest planet in our solar system 🪐\n• Diameter: 139,820 km (11x Earth!)\n• Has 95 known moons including Ganymede (largest moon in solar system)\n• Famous for: Great Red Spot (a storm bigger than Earth!)\n• It's a gas giant — no solid surface"],
  ["smallest planet","Mercury is the smallest planet in our solar system ☿\n• Diameter: 4,879 km\n• Also closest to the Sun\n• A year on Mercury = 88 Earth days\n• Surface temperature: -180°C to 430°C (extreme range!)"],
  ["planet closest to sun","Mercury is the closest planet to the Sun ☿\n• Distance: ~57.9 million km from Sun\n• Orbits the Sun in just 88 Earth days\n• Has no atmosphere — no protection from Sun's heat\n• Despite being closest to Sun, Venus is actually hotter!"],
  ["smallest ocean","The Arctic Ocean is the smallest ocean ❄️\n• Area: ~14.06 million sq km\n• Located around the North Pole\n• Mostly covered by sea ice\n• Despite being smallest, it's still larger than Russia!"],
  ["boiling point of water","The boiling point of water is 100°C (212°F) 💧\n• At standard atmospheric pressure (1 atm)\n• At higher altitudes, it boils at lower temperatures\n• On Mount Everest, water boils at ~70°C!\n• Freezing point: 0°C (32°F)"],
  ["angel falls location","Angel Falls is located in Venezuela, South America 💧\n• Height: 979 metres (highest waterfall in the world!)\n• Located in Canaima National Park\n• Named after Jimmy Angel, an American aviator who flew over it in 1933\n• Water falls so far it turns to mist before reaching the ground!"],
  ["fun fact honey","Honey never expires! 🍯\n• 3,000-year-old honey found in Egyptian tombs — still edible!\n• Low moisture + acidic pH + hydrogen peroxide = natural preservative\n• Bees must visit ~2 million flowers to make 1 pound of honey\n• Honey is the only food made by an insect that humans eat"],
  ["fun fact fingerprints","Every person has unique fingerprints — even identical twins! 👆\n• Fingerprints form before birth (fetal development)\n• Even koalas have fingerprints similar to humans!\n• Patterns: Loops (65%), Whorls (30%), Arches (5%)\n• Used in: Aadhaar, phones, banking, crime solving"],
  ["fun fact earth spin","Earth rotates faster at the equator than at the poles! 🌍\n• Equator: ~1,670 km/h\n• Poles: Nearly 0 km/h\n• That's why rockets launched near equator get a free speed boost!\n• Earth's rotation is slowly slowing down by 1.4 ms per century"],
  ["fun fact sound space","Sound cannot travel in space! 🌌\n• Sound needs a medium (matter) to travel through\n• In space: No air = no sound\n• Movies like Star Wars are scientifically wrong — space battles would be SILENT!\n• Light waves can travel in space; sound waves cannot"],
  ["fun fact octopus","An octopus has 3 hearts and 9 brains! 🐙\n• 2 branchial hearts pump blood through gills\n• 1 systemic heart pumps blood through body\n• Blood is BLUE (copper-based haemocyanin)\n• 1 central brain + 1 in each of 8 arms\n• Can change colour AND texture in milliseconds"],
  ["fun fact banana","Bananas grow upward toward the sun! 🍌\n• The curve is caused by negative geotropism (grows away from gravity)\n• Bananas are technically berries (botanically)\n• Strawberries are NOT berries (botanically)!\n• A banana plant is actually a giant herb — not a tree!\n• Bananas are 75% water"],
  ["fun fact lightning","Lightning strikes Earth about 100 times every second! ⚡\n• ~8.6 million times per day\n• Temperature of lightning: ~30,000 K (5× hotter than Sun's surface!)\n• Duration: Just 0.2 seconds\n• Lightning can strike the same place twice (Empire State Building: ~25 times/year!)"],
  ["fun fact diamond","Diamonds are made of pure carbon — same as graphite in pencils! 💎\n• Carbon atoms arranged differently: Diamond (cubic lattice) vs Graphite (sheets)\n• Diamond: Hardest natural substance (10 on Mohs scale)\n• Graphite: Very soft (writing on paper)\n• Stars contain diamond cores (giant crystallised carbon)!"],
  ["fun fact brain storage","Human brain can store about 2.5 petabytes of information! 🧠\n• 2.5 petabytes = 2.5 million gigabytes\n• Equivalent to 3 million hours of TV!\n• Brain has ~86 billion neurons\n• Uses ~20 watts of power (like a dim light bulb)\n• Reading this fact is creating new neural connections right now!"],
  ["fun fact venus day","A day on Venus is longer than a year on Venus! 🪐\n• Venus rotates very slowly: 1 Venus day = 243 Earth days\n• Venus orbits Sun in: 225 Earth days (shorter than its day!)\n• Venus also rotates BACKWARDS (East to West)\n• On Venus, the Sun rises in the West and sets in the East!"],
  ["fun fact chocolate","Chocolate comes from cacao tree seeds! 🍫\n• Aztecs used cacao beans as currency!\n• Milk chocolate invented in Switzerland (1875)\n• Dark chocolate (70%+ cacao): More healthy\n• Theobromine in chocolate: Toxic to dogs and cats!\n• White chocolate has no cocoa solids — not technically chocolate"],
  ["fun fact mars day","A day on Mars is almost the same length as on Earth! 🔴\n• Mars day (Sol): 24 hours 37 minutes\n• Mars year: 687 Earth days (almost 2 Earth years!)\n• Mars has seasons — like Earth (but each season is twice as long)\n• Mars has the tallest volcano: Olympus Mons (21 km — 2.5× Everest!)\n• Curiosity and Perseverance rovers are currently on Mars"],
  ["fun fact human body","Human Body Fun Facts 🫁\n• Your stomach gets a new lining every 3–4 days (acid would digest old one)\n• Your nose can detect 1 trillion different scents\n• Human eye can distinguish ~10 million different colours\n• Your bones are 5× stronger than steel (by weight)\n• DNA in one human cell, if stretched: Would be 2 metres long!\n• Laid end to end, your blood vessels would circle Earth 2.5 times!"],
  ["fun fact internet traffic","Internet Traffic Facts 🌐\n• Every minute on the internet:\n  • 6 million Google searches\n  • 500 hours of YouTube videos uploaded\n  • 1 billion WhatsApp messages sent\n  • 695,000 Instagram Reels watched\n• Total internet data: ~100 zettabytes by 2023\n• India: 800+ million internet users (2nd in world)\n• First website: info.cern.ch (Tim Berners-Lee, 1991 — still accessible!)"],
  ["fun fact money facts","Money Fun Facts 💰\n• India's currency note: Made from cotton and linen (not paper!)\n• INR symbol ₹: Designed by D. Udaya Kumar (2010)\n• A coin loses value the longer it circulates (gets lighter from handling)\n• Rs. 2,000 note: Printed but then withdrawn from circulation (2023)\n• India mints coins at: Mumbai, Kolkata, Hyderabad, Noida\n• Biggest denomination ever printed: Zimbabwe $100 trillion note (2009)!"],
  ["fun fact animal facts","Amazing Animal Facts 🦁\n• Cows can climb stairs but cannot climb DOWN stairs\n• Elephants are the only mammals that cannot jump\n• A snail can sleep for 3 years!\n• Butterflies taste food with their feet\n• Otters hold hands while sleeping so they don't drift apart\n• A group of flamingos is called a 'flamboyance'\n• Sloths can hold their breath longer than dolphins"],
  ["fun fact food facts","Food Fun Facts 🍕\n• Honey is the only food that does not spoil (ever)\n• Pineapple takes 2 years to grow (one fruit!)\n• Avocados are botanically a berry\n• Cashews grow outside the cashew apple fruit\n• Vanilla flavouring once came from beaver glands (vanillin was extracted!)\n• India grows more bananas than any other country\n• Ketchup was sold as medicine in the 1830s!"],
  ["fun fact math facts","Cool Math Facts 📐\n• A googol = 10¹⁰⁰ (1 followed by 100 zeros)\n• A googolplex = 10^googol (number bigger than atoms in the universe)\n• 111,111,111 × 111,111,111 = 12,345,678,987,654,321 (perfect pattern!)\n• The word 'hundred' comes from Old Norse meaning '120' (historical confusion)\n• Zero was invented in India (Brahmagupta, 628 AD)\n• Pi (π) has been calculated to 100 trillion digits — and still going"],
  ["fun fact geography facts","Cool Geography Facts 🌍\n• Russia is so large it spans 11 time zones\n• Australia is wider than the Moon\n• The Pacific Ocean is larger than all of Earth's land combined\n• If you drilled through Earth's centre from India, you'd emerge near Hawaii\n• Mount Everest grows ~4mm per year (Indian plate still moving north)\n• Africa spans all four hemispheres (North, South, East, West)"],
  ["fun fact science facts","Cool Science Facts 🔬\n• There are more atoms in a grain of sand than grains of sand on all beaches\n• Hot water freezes faster than cold water (Mpemba Effect)\n• Humans share 60% DNA with bananas!\n• The human body contains enough iron to make a 3-inch nail\n• A teaspoon of a neutron star weighs about 10 million tonnes\n• 99.9% of all species that ever lived on Earth are now extinct"],
  ["fun fact language facts","Language Fun Facts 🗣️\n• There are ~7,000 languages in the world\n• India alone has 122 major languages and 1,500+ dialects\n• Most spoken language: Mandarin Chinese (~900 million native speakers)\n• English has the most words: ~1 million+\n• The language with most letters: Khmer (Cambodian) — 74 letters\n• Sanskrit: One of the world's oldest and most structured languages\n• Every 2 weeks, a language dies (someone is the last speaker)"],
  ["fun fact india facts","Amazing Facts About India 🇮🇳\n• India invented Zero, Chess, Yoga, Ayurveda, and the decimal system\n• India has the world's largest film industry (Bollywood + regional)\n• India is the world's largest democracy (900 million+ voters)\n• Kumbh Mela: Largest human gathering on Earth (50+ million people)\n• India is the world's largest producer of: Milk, Pulses, Spices, Bananas, Tea, Jute\n• Indian Railways: One of world's largest employers\n• India has 40 UNESCO World Heritage Sites"],
  ["fun fact human cells","Human body replaces ~330 billion cells per day! 🔬\n• That's ~3.8 million per second!\n• Skin cells regenerate every 27 days\n• Red blood cells live ~120 days\n• Brain neurons: Most last your entire lifetime\n• Every 7–10 years, most of your body's cells are new!"],
  ["fun fact salt ocean","Ocean contains enough salt to cover all continents 5 km deep! 🌊\n• Oceans are 3.5% salt on average\n• Total ocean salt: ~50 quadrillion tonnes\n• Salt comes from: River runoff eroding rocks, underwater volcanic vents\n• Dead Sea: 10× saltier than oceans\n• Red Sea: Saltiest open ocean"],
  ["fun fact ants","Ants can carry 50 times their own body weight! 🐜\n• There are ~20 quadrillion ants on Earth\n• All worker ants are female\n• Queen ant can live 20–30 years\n• Ants never sleep (no REM sleep)\n• If all ants were weighed, they'd weigh more than all wild mammals combined!"],
  ["fun fact sahara cold","Sahara Desert gets cold at night! 🏜️\n• Days: up to 50°C, nights: can drop to 0°C\n• No clouds to trap heat — it escapes rapidly at night\n• Sahara was GREEN and lush 10,000 years ago!\n• Sahara receives snowfall in parts (Atlas Mountains)"],
  ["fun fact platypus","The platypus is one of nature's strangest animals! 🦆\n• Mammal that lays eggs — only 5 monotreme species exist\n• Has duck bill, beaver tail, otter feet\n• Males have venomous spurs on hind legs\n• Can sense electrical fields of prey underwater\n• Glows under UV light (biofluorescent)!"],
  ["fun fact sneeze","A sneeze travels at ~160 km/h! 🤧\n• Can travel 8 metres (spray droplets)\n• You can't sneeze with your eyes open — eyelids close involuntarily\n• Your heart does NOT stop when you sneeze (just a myth)\n• Sneezing with mouth closed can be dangerous — huge pressure builds up"],
  ["fun fact water boil","Hot water can freeze faster than cold water in some conditions! ❄️\n• Called the Mpemba Effect (named after Erasto Mpemba, 1963)\n• First noticed by Aristotle in ancient Greece!\n• Scientists still debate exactly why it happens\n• Evaporation, convection, dissolved gases may all play a role"],
  ["fun fact tree oxygen","One large tree produces enough oxygen for 2 people per day! 🌳\n• A single tree absorbs ~22 kg of CO₂ per year\n• Amazon rainforest produces 20% of Earth's oxygen\n• India has 35+ billion trees (but still losing forests)\n• Plant a tree — cheapest way to fight climate change!"],
  ["fun fact glass solid","Glass is not actually a liquid — it is an amorphous solid! 🪟\n• Old myth: Medieval glass windows are thicker at the bottom because glass flowed\n• Truth: Old glassmaking was imperfect — windows were uneven from the start\n• Obsidian: Natural glass formed from volcanic lava"],
],

extra_science: [
  ["what gas do plants absorb","Plants absorb Carbon Dioxide (CO₂) 🌿\n• During photosynthesis, plants take in CO₂ from the air\n• They use it along with water and sunlight to make glucose\n• They then release Oxygen (O₂) as a byproduct\n• Formula: 6CO₂ + 6H₂O + Light → Glucose + 6O₂"],
  ["boiling point of water","The boiling point of water is 100°C (212°F) 💧\n• At standard atmospheric pressure\n• Increases at higher pressure, decreases at lower pressure\n• At high altitude (e.g. Everest), water boils at ~70°C!"],
  ["what is h2o","H₂O is the chemical formula for water 💧\n• H₂O = 2 Hydrogen atoms + 1 Oxygen atom\n• Colourless, tasteless, odourless liquid\n• Covers 71% of Earth's surface\n• Essential for all known life on Earth!"],
  ["powerhouse of cell","The mitochondria is the powerhouse of the cell ⚡\n• Produces ATP (Adenosine Triphosphate) — the cell's energy currency\n• Has its own DNA (came from ancient bacteria!)\n• Cells that need more energy (like muscle cells) have more mitochondria\n• Process: Cellular respiration"],
  ["red planet","Mars is called the Red Planet 🔴🪐\n• Red colour comes from iron oxide (rust) on its surface\n• 4th planet from the Sun\n• Has the tallest volcano: Olympus Mons (21 km high!)\n• Has 2 moons: Phobos and Deimos\n• NASA rovers: Curiosity and Perseverance are exploring it!"],
  ["what is gravity","Gravity is a fundamental force of attraction between masses 🍎\n• Discovered by: Isaac Newton (inspired by a falling apple, ~1666)\n• Formula: F = Gm₁m₂/r²\n• Earth's surface gravity: 9.8 m/s²\n• Keeps planets in orbit, holds atmosphere in place\n• Einstein later described it as the curvature of spacetime"],
  ["what is photon","A photon is a particle of light ☀️\n• Has no mass and no electric charge\n• Travels at speed of light: 3×10⁸ m/s\n• Carries electromagnetic energy\n• Both a particle AND a wave (wave-particle duality!)"],
  ["what is newton","1 Newton is the SI unit of force 📐\n• 1 N = force needed to accelerate 1 kg at 1 m/s²\n• Named after Sir Isaac Newton\n• Formula: F = ma (Force = mass × acceleration)"],
],

extra_maths: [
  ["what is 12 x 8","12 × 8 = 96 📐\nStep: 12 × 8 = (10 × 8) + (2 × 8) = 80 + 16 = 96 ✅"],
  ["square root of 64","√64 = 8 📐\nBecause 8 × 8 = 64 ✅\nThis is a perfect square!"],
  ["25 percent of 200","25% of 200 = 50 📊\nFormula: (25/100) × 200 = 0.25 × 200 = 50 ✅"],
  ["what is 9 squared","9² = 81 📐\n9 × 9 = 81 ✅\nThis is a perfect square!"],
  ["value of pi","π (Pi) ≈ 3.14159265358979... 🔵\n• Pi is an irrational number — it never ends or repeats!\n• Used for: Circle area (πr²), Circumference (2πr)\n• Mathematicians have calculated Pi to over 100 trillion digits!\n• Pi Day: March 14 (3/14)"],
  ["how many states in india","India has 28 States and 8 Union Territories 🇮🇳\n• Total: 28 + 8 = 36 administrative divisions\n• Largest state by area: Rajasthan\n• Smallest state by area: Goa\n• Most populous state: Uttar Pradesh\n• Newest Union Territory: Ladakh (2019)"],
  ["who wrote national anthem","The national anthem of India 'Jana Gana Mana' was written by Rabindranath Tagore 🎵\n• Written in: 1911 (in Bengali)\n• Adopted as national anthem: 24 January 1950\n• Duration: 52 seconds (full version)\n• Tagore was also the first Asian Nobel Laureate (Nobel Prize in Literature, 1913)"],
],

biology: [
  ["largest organ human body|largest organ body", "The largest organ in the human body is the Skin 🩺\n• Total area: ~2 square metres\n• Weight: ~4 kg\n• Functions: Protection, temperature regulation, sensation\n• Has 3 layers: Epidermis, Dermis, Hypodermis\n• Renews itself every 27 days!"],
  ["how many bones human body|bones in body|number of bones", "The human body has 206 bones 🦴\n• Babies are born with ~270 bones — they fuse as we grow!\n• Largest bone: Femur (thigh bone)\n• Smallest bone: Stapes (in the ear — 3mm!)\n• Skull protects the brain, ribs protect the heart and lungs"],
  ["largest bone body|femur bone", "The largest bone in the human body is the Femur 🦴\n• Also called the thigh bone\n• Connects hip to knee\n• Strongest bone in the body\n• Can support up to 30 times the body's weight!"],
  ["organ controls body|brain function", "The Brain controls the entire body 🧠\n• Weight: ~1.4 kg\n• Has ~86 billion neurons\n• Uses 20% of the body's energy\n• Parts: Cerebrum (thinking), Cerebellum (balance), Brainstem (breathing/heartbeat)\n• Never stops working — even during sleep!"],
  ["universal blood donor|blood group o negative|o negative blood", "O Negative (O-) is the universal blood donor 🩸\n• Can donate blood to ALL blood groups\n• Universal RECEIVER: AB Positive (AB+)\n• Why universal? No A, B, or Rh antigens — accepted by any body\n• Only ~7% of people have O- blood — very rare and precious!"],
  ["organ pumps blood|heart function|what does heart do", "The Heart pumps blood throughout the body ❤️\n• Beats ~70 times per minute = 100,000 times a day!\n• Has 4 chambers: Right Atrium, Right Ventricle, Left Atrium, Left Ventricle\n• Pumps ~5 litres of blood per minute\n• Size of your fist\n• Beats 2.5 billion times in a lifetime!"],
  ["vitamin from sunlight|vitamin d sunlight", "We get Vitamin D from sunlight ☀️\n• Called the 'Sunshine Vitamin'\n• Sunlight hits skin → body produces Vitamin D\n• Essential for: Strong bones, immunity, mood\n• Deficiency causes: Rickets (in children), weak bones, depression\n• Best time: 10am–3pm sun exposure (15–20 minutes)"],
  ["freezing point water|water freeze|0 degrees", "The freezing point of water is 0°C (32°F) 🧊\n• Water turns from liquid to solid (ice) at 0°C\n• At standard atmospheric pressure\n• Salt water freezes at a lower temperature (~-2°C)\n• Interesting: Water expands when it freezes (ice is less dense than water!)"],
  ["unit of force|newton unit", "The unit of force is the Newton (N) 📐\n• Named after Sir Isaac Newton\n• 1 Newton = force needed to accelerate 1 kg at 1 m/s²\n• Formula: F = ma\n• Weight is also a force: Weight = mass × 9.8 N/kg"],
  ["unit of energy|joule unit", "The unit of energy is the Joule (J) ⚡\n• Named after physicist James Prescott Joule\n• 1 Joule = energy to move 1 Newton over 1 metre\n• Other energy units: Calorie (food), kWh (electricity), eV (atomic)\n• 1 food calorie = 4,184 Joules!"],
  ["part of plant photosynthesis|leaves photosynthesis", "Photosynthesis mainly happens in the Leaves 🌿\n• Leaves contain Chloroplasts which have Chlorophyll (green pigment)\n• Chlorophyll captures sunlight energy\n• Stomata (tiny pores) on leaves absorb CO₂\n• Roots supply water through the stem to leaves\n• That's why leaves are green!"],
  ["gas plants release photosynthesis|plants release oxygen", "Plants release Oxygen (O₂) during photosynthesis 🌿\n• Plants absorb CO₂ + Water + Sunlight\n• They produce Glucose (food) and release O₂ as a byproduct\n• Formula: 6CO₂ + 6H₂O + Light → C₆H₁₂O₆ + 6O₂\n• Every tree produces enough oxygen for 2 people per day! 🌳"],
],

physics_qa: [
  ["what is speed|speed definition|speed formula", "Speed is the distance covered per unit of time 🏃\n• Formula: Speed = Distance ÷ Time (S = D/T)\n• Unit: metres per second (m/s) or km/h\n• Example: Car travels 120km in 2 hours → Speed = 60 km/h\n• Speed has no direction (scalar quantity)"],
  ["what is velocity|velocity definition", "Velocity is speed with a specific direction 🧭\n• Example: 60 km/h NORTH — that's velocity\n• Vector quantity (has both magnitude AND direction)\n• Formula: Velocity = Displacement ÷ Time\n• If you run around a track and return to start, velocity = 0 (but speed ≠ 0)"],
  ["what is acceleration|acceleration definition", "Acceleration is the rate of change of velocity 🚀\n• Formula: a = (v - u) / t\n• Where: v = final velocity, u = initial velocity, t = time\n• Unit: m/s²\n• A car going faster = positive acceleration\n• A car braking = negative acceleration (deceleration)\n• Free fall acceleration on Earth: 9.8 m/s²"],
  ["what is friction|friction force", "Friction is a force that opposes motion 🔧\n• Acts between two surfaces in contact\n• Types: Static (prevents motion), Kinetic (during motion), Rolling, Fluid\n• Friction is useful: Walking, car brakes, writing with a pen\n• Friction is harmful: Wears out machine parts\n• Reduced by: Lubricants (oil), ball bearings, smooth surfaces"],
  ["what is gravity|gravity definition|gravity force", "Gravity is the force that attracts objects towards Earth 🍎\n• Discovered by Sir Isaac Newton (~1666)\n• Earth's gravity: 9.8 m/s²\n• Moon's gravity: 1/6th of Earth's (that's why astronauts bounce!)\n• Formula: F = Gm₁m₂/r²\n• Gravity keeps the Moon orbiting Earth and Earth orbiting the Sun 🌍"],
],

space_qa: [
  ["what is the sun|sun star", "The Sun is a star ☀️\n• A medium-sized yellow dwarf star at the centre of our solar system\n• Distance from Earth: ~150 million km\n• Temperature: Surface ~5,500°C, Core ~15 million°C\n• Age: ~4.6 billion years old\n• Makes up 99.86% of the solar system's mass!\n• Light from Sun reaches Earth in 8 minutes 20 seconds"],
  ["how many planets solar system|number of planets|8 planets", "There are 8 planets in our solar system 🪐\n\n1. ☿ Mercury — smallest, closest to Sun\n2. ♀ Venus — hottest planet\n3. 🌍 Earth — our home!\n4. ♂ Mars — Red Planet\n5. ♃ Jupiter — largest planet\n6. ♄ Saturn — has beautiful rings\n7. ♅ Uranus — rotates on its side\n8. ♆ Neptune — farthest, windiest\n\nMemory trick: My Very Educated Mother Just Served Us Nachos! 🌮"],
  ["what galaxy do we live in|milky way galaxy", "We live in the Milky Way galaxy 🌌\n• A spiral galaxy\n• Contains 200–400 billion stars\n• Diameter: ~100,000 light-years\n• Our solar system is in the Orion Arm\n• Nearest galaxy: Andromeda (2.5 million light-years away)\n• The Milky Way and Andromeda will collide in ~4.5 billion years!"],
  ["planet closest to sun|mercury closest", "Mercury is the closest planet to the Sun ☿\n• Distance: ~57.9 million km\n• Orbits the Sun in just 88 Earth days (shortest year!)\n• Despite being closest, Venus is HOTTER (because of thick atmosphere)\n• No atmosphere → extreme temperatures: -180°C to 430°C\n• Named after the Roman messenger god"],
  ["planet has rings|saturn rings|which planet rings", "Saturn is most famous for its rings 🪐\n• Rings are made of ice and rock particles\n• Ring system extends ~282,000 km from Saturn\n• Jupiter, Uranus, and Neptune also have rings\n• Saturn is less dense than water — it could float!\n• Has 146 known moons — most in the solar system"],
],

everyday_qa: [
  ["hours in a day|how many hours day|24 hours", "There are 24 hours in a day ⏰\n• Earth takes 24 hours to complete one full rotation\n• Day = 12 hours (approx), Night = 12 hours\n• 24 hours = 1,440 minutes = 86,400 seconds\n• The 24-hour system was established by ancient Egyptians!"],
  ["minutes in an hour|60 minutes|how many minutes hour", "There are 60 minutes in an hour ⏱️\n• 1 minute = 60 seconds\n• 1 hour = 60 minutes = 3,600 seconds\n• The 60-minute hour comes from ancient Babylonian mathematics (base-60 system)"],
  ["seconds in a minute|60 seconds", "There are 60 seconds in a minute ⏱️\n• 1 minute = 60 seconds\n• 1 hour = 3,600 seconds\n• 1 day = 86,400 seconds\n• The definition of a second is based on caesium atom vibrations (9,192,631,770 vibrations!)"],
  ["days in a week|7 days|how many days week", "There are 7 days in a week 📅\n• Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday\n• Named after celestial bodies (Sun=Sunday, Moon=Monday, Mars=Tuesday...)\n• A week has been 7 days for over 4,000 years (from ancient Babylon)"],
  ["months in a year|12 months|how many months", "There are 12 months in a year 📅\n• Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec\n• 365 days in a year (366 in a leap year every 4 years)\n• February is shortest: 28 days (29 in leap year)\n• July and August were named after Julius Caesar and Augustus Caesar!"],
],

logical_qa: [
  ["can penguins fly|do penguins fly|penguin fly", "No, penguins cannot fly 🐧\n• Their wings evolved into flippers — perfect for swimming!\n• They can swim up to 35 km/h underwater\n• Emperor Penguins can dive 500+ metres deep\n• Found in: Antarctica, South America, South Africa, New Zealand\n• They're excellent divers but flightless on land 🏊"],
  ["do fish breathe oxygen|fish gills oxygen", "Yes! Fish breathe oxygen — but through gills, not lungs 🐟\n• Water passes over gills → gills extract dissolved oxygen from water\n• They breathe OUT carbon dioxide into water\n• Humans breathe oxygen from AIR; fish breathe oxygen from WATER\n• Some fish (like lungfish) can also breathe air!"],
  ["can humans live without water|water survival", "Humans can only survive 3–4 days without water 💧\n• Without food: Can survive 3 weeks\n• Without water: Only 3–4 days (sometimes less in heat)\n• Body is 60% water\n• Water is needed for: Blood, digestion, temperature regulation, brain function\n• Drink 2–3 litres of water daily! 🌊"],
  ["color of chlorophyll|chlorophyll green", "Chlorophyll is Green in colour 🟢\n• It's the pigment in plant leaves that captures sunlight\n• Chlorophyll absorbs Red and Blue light — reflects Green light\n• That's why leaves look green to our eyes!\n• In autumn, chlorophyll breaks down → leaves turn yellow/red/orange"],
  ["what does thermometer measure|thermometer temperature", "A thermometer measures Temperature 🌡️\n• Types: Mercury thermometer, Digital thermometer, Infrared thermometer\n• Units: Celsius (°C), Fahrenheit (°F), Kelvin (K)\n• Clinical thermometer measures body temperature (normal: 37°C / 98.6°F)\n• Invented by: Galileo Galilei (around 1592) and improved by Fahrenheit & Celsius"],
],

ai_knowledge: [
  ["what is artificial intelligence|ai definition|what is ai", "Artificial Intelligence (AI) is the simulation of human intelligence by machines 🤖\n• AI can: Think, Learn, Reason, Solve problems, Understand language\n• Types: Narrow AI (specific tasks), General AI (any task like humans)\n• Examples: Siri, Alexa, ChatGPT, self-driving cars, recommendation systems\n• Father of AI: John McCarthy (coined the term in 1956)\n• AI is NOT magic — it learns from data and patterns!"],
  ["what is machine learning|ml definition", "Machine Learning (ML) is a branch of AI where machines learn from data 📊\n• Instead of being programmed with rules, ML finds patterns in data\n• Types: Supervised (labelled data), Unsupervised (unlabelled), Reinforcement (trial & error)\n• Used in: Netflix recommendations, spam filters, medical diagnosis, voice recognition\n• The more data it gets, the smarter it becomes!"],
  ["what is chatgpt|chatgpt definition", "ChatGPT is an AI language model made by OpenAI 🤖\n• GPT = Generative Pre-trained Transformer\n• Can: Write essays, answer questions, code, translate, summarise\n• Trained on billions of web pages and books\n• Launched: November 2022 — reached 1 million users in 5 days!\n• I am Apsara AI — I am also an AI, but built for YOU! 💕"],
  ["what is a chatbot|chatbot definition", "A chatbot is a computer program that simulates conversation with humans 💬\n• Can be rule-based (follows fixed rules) or AI-powered (learns)\n• Used in: Customer service, education, healthcare, entertainment\n• Examples: Siri, Alexa, Apsara AI 💕, customer support bots\n• I'm a chatbot built specially for you — smart, friendly and always learning! 🌟"],
  ["what is natural language processing|nlp definition", "Natural Language Processing (NLP) is AI that understands human language 🗣️\n• Helps computers understand, interpret, and generate text or speech\n• Used in: Translation (Google Translate), Siri/Alexa, Spam detection, Sentiment analysis\n• It's why you can talk to AI naturally instead of using code\n• NLP is how I (Apsara AI) understand your questions! 💕"],
],

safety_qa: [
  ["what is privacy|privacy definition", "Privacy is the protection of your personal information 🔒\n• Includes: Name, address, phone number, photos, messages, passwords\n• Digital privacy: Controlling what apps/websites know about you\n• Tips: Use strong passwords, don't share personal info publicly, check app permissions\n• Privacy is a fundamental human right!"],
  ["what is cybersecurity|cyber security definition", "Cybersecurity is the protection of digital systems from attacks 🛡️\n• Protects: Computers, phones, networks, data\n• Types of threats: Hacking, malware, phishing, ransomware\n• Cybersecurity tips:\n  • Use strong passwords\n  • Enable 2-factor authentication\n  • Don't click suspicious links\n  • Keep software updated\n• Cybercrime is one of the fastest-growing crimes worldwide!"],
  ["what is hacking|hacking definition", "Hacking means gaining unauthorized access to computer systems 🖥️\n• Types: Black hat (criminal), White hat (ethical hacker/security tester), Grey hat\n• Common methods: Phishing, brute force, malware, social engineering\n• Ethical hacking (White hat): Companies hire hackers to find and fix security holes\n• Hacking without permission is illegal and punishable by law!"],
  ["what is password security|strong password", "Password security means using strong passwords to protect accounts 🔐\n• A strong password has: 8+ characters, uppercase + lowercase, numbers, symbols\n• Bad password: '123456' or 'password' (most hacked passwords!)\n• Good password: 'Apsara@2025#Study!'\n• Tips:\n  • Never share passwords\n  • Use different passwords for each account\n  • Use a password manager\n  • Enable 2-Factor Authentication (2FA)"],
  ["why not share otp|otp security|one time password", "Never share your OTP (One-Time Password) with anyone! 🚨\n• OTP = One-Time Password sent to your phone/email\n• It's a temporary code to verify your identity\n• If someone else gets your OTP → they can access your account, bank, UPI!\n• Banks and companies NEVER ask for your OTP\n• If someone calls asking for OTP — it's a SCAM! Hang up immediately 📵"],
],

misc_qa: [
  ["what is motivation|motivation definition", "Motivation is the reason or drive to take action and achieve goals 💪\n• Types: Intrinsic (from within — passion, purpose) and Extrinsic (from outside — rewards, grades)\n• How to stay motivated:\n  • Set clear goals\n  • Celebrate small wins\n  • Surround yourself with positive people\n  • Remember your WHY\n• 'People often say motivation doesn't last. Neither does bathing — that's why we recommend it daily!' — Zig Ziglar 🌟"],
  ["what is success|success definition", "Success is achieving your goals and fulfilling your potential 🏆\n• Success looks different for everyone — there's no single definition\n• It can mean: Passing an exam, helping family, building a business, being happy\n• Key ingredients: Hard work + Consistency + Learning from failure + Patience\n• 'Success is not final, failure is not fatal — it's the courage to continue that counts.' — Churchill\n• YOU define your own success, Rein! 💕🌟"],
  ["what is friendship|friendship definition", "Friendship is a relationship built on trust, care, and mutual support 🤝\n• True friends: Celebrate your wins, support you in failures, are honest with you\n• 'A real friend is one who walks in when the rest of the world walks out.' — Walter Winchell\n• Quality over quantity — 2 true friends are better than 20 fake ones\n• Friendships make life richer, happier, and more meaningful! 💕"],
  ["what is happiness|happiness definition", "Happiness is a feeling of joy, contentment, and satisfaction 😊\n• It comes from: Relationships, gratitude, purpose, health, small daily pleasures\n• Studies show: Helping others, spending time in nature, and expressing gratitude boost happiness\n• Happiness is NOT just about money or fame\n• 'Happiness is not something ready-made. It comes from your own actions.' — Dalai Lama 🌸\n• Smile more, worry less! 💕"],
  ["what is knowledge|knowledge definition", "Knowledge is information, understanding, and skills gained through learning and experience 📚\n• Types: Factual (facts), Conceptual (ideas), Procedural (how to do things), Metacognitive (knowing how you learn)\n• 'An investment in knowledge pays the best interest.' — Benjamin Franklin\n• The more you learn, the more you realise you don't know — and that's a beautiful thing!\n• Keep learning every day, Rein — knowledge is power! 💕🌟"],
],

president_india: [
  ["who is president of india|president india|current president india", "The President of India is the constitutional head of state 🏛️\n• Current President (2022–): Smt. Droupadi Murmu\n• She is the 15th President of India\n• First tribal woman to become President of India\n• Role: Head of state, Supreme Commander of Armed Forces, gives assent to bills\n• First President of India: Dr. Rajendra Prasad (1950–1962)\n• President lives in: Rashtrapati Bhavan, New Delhi"],
  ["who is iron man india|sardar patel|vallabhbhai patel", "Sardar Vallabhbhai Patel is known as the Iron Man of India 🦅\n• Full name: Sardar Vallabhbhai Jhaverbhai Patel\n• Born: 31 October 1875, Nadiad, Gujarat\n• He unified 562 princely states into independent India after 1947\n• First Deputy Prime Minister and Home Minister of India\n• National Unity Day: 31 October (his birthday)\n• Statue of Unity (world's tallest statue, 182m) was built in his honour in Gujarat"],
  ["who wrote indian constitution|b r ambedkar constitution", "Dr. B. R. Ambedkar was the chief architect of the Indian Constitution 📜\n• Full name: Dr. Bhimrao Ramji Ambedkar\n• Chaired the Drafting Committee of the Constitution\n• Constitution was adopted: 26 November 1949\n• Came into effect: 26 January 1950 (Republic Day)\n• Also: Social reformer, economist, jurist\n• 'Babasaheb' Ambedkar received the Bharat Ratna (posthumously) in 1990"],
  ["national song india|vande mataram", "The National Song of India is Vande Mataram 🇮🇳\n• Written by: Bankim Chandra Chattopadhyay\n• From the novel: Anandamath (1882)\n• Meaning: 'I bow to thee, Mother'\n• Was the rallying cry during the freedom struggle\n• Adopted as National Song: 24 January 1950\n• Note: National ANTHEM is Jana Gana Mana (different from national song!)"],
  ["capital of meghalaya|meghalaya capital", "The capital of Meghalaya is Shillong 🏙️\n• Known as the 'Scotland of the East' 🏴󠁧󠁢󠁳󠁣󠁴󠁿\n• Located in the Northeast of India\n• Famous for: Heavy rainfall (Cherrapunji/Mawsynram — wettest places on Earth are nearby!)\n• Shillong Peak is the highest point in the city\n• Beautiful hill station with cool climate 🌿"],
  ["capital of nagaland|nagaland capital", "The capital of Nagaland is Kohima 🏙️\n• Located in Northeast India, bordering Assam and Myanmar\n• Famous for: Hornbill Festival (December) — the 'Festival of Festivals'\n• Kohima War Cemetery — WW2 memorial\n• Nagaland is known as the 'Land of Festivals'\n• Capital city sits at an altitude of ~1500 metres"],
  ["capital of arunachal pradesh|itanagar capital", "The capital of Arunachal Pradesh is Itanagar 🏙️\n• Itanagar = 'City of the Ita Fort'\n• Arunachal Pradesh = 'Land of the Dawn-Lit Mountains' 🌄\n• Largest state of Northeast India by area\n• Borders: China, Bhutan, Myanmar\n• Famous for: Buddhist monasteries, Tawang, Ziro valley"],
  ["who founded apple|apple founder|steve jobs", "Apple was founded by Steve Jobs, Steve Wozniak, and Ronald Wayne 🍎\n• Founded: April 1, 1976 (April Fool's Day!)\n• Steve Jobs: Visionary leader and CEO\n• Steve Wozniak: Built the first Apple computer\n• Ronald Wayne: Drew the first Apple logo (sold his 10% share for just $800!)\n• First product: Apple I computer (1976)\n• Apple became world's first trillion-dollar company in 2018!"],
  ["what is programming|programming definition|what is coding", "Programming is writing instructions for computers to follow 💻\n• Instructions are written in programming languages: Python, Java, C++, HTML, etc.\n• Programs tell computers: What to do, When to do it, How to do it\n• Programming is used in: Apps, websites, games, AI, robots, rockets!\n• You don't need a degree to start — you can learn online for free!\n• 'Everybody in this country should learn to program a computer, because it teaches you how to think.' — Steve Jobs 💡"],
  ["capital of france|france capital|paris capital", "The capital of France is Paris 🗼\n• Population: ~2.1 million (city), ~12 million (metro area)\n• Famous for: Eiffel Tower, Louvre Museum, Notre-Dame Cathedral\n• Language: French\n• Currency: Euro (€)\n• Fashion capital of the world\n• Paris is called the 'City of Light' 💡"],
  ["capital of china|china capital|beijing capital", "The capital of China is Beijing 🏯\n• Population: ~22 million — one of the world's largest cities\n• Famous for: Great Wall of China, Forbidden City, Tiananmen Square\n• Language: Mandarin Chinese\n• Beijing hosted the Olympics in 2008 and 2022 (Summer and Winter!)\n• Was known as 'Peking' historically"],
  ["capital of canada|canada capital|ottawa capital", "The capital of Canada is Ottawa 🍁\n• NOT Toronto or Vancouver (common misconceptions!)\n• Located in Ontario province\n• Has the Parliament of Canada (Peace Tower)\n• Famous Rideau Canal freezes in winter — world's largest natural ice skating rink!\n• Ottawa is officially bilingual: English and French"],
  ["capital of russia|russia capital|moscow capital", "The capital of Russia is Moscow 🏙️\n• Population: ~12 million — largest city in Europe\n• Famous for: Red Square, Kremlin, St. Basil's Cathedral\n• The Kremlin is the seat of Russian government\n• Moscow metro is famous for its beautiful, artistic stations\n• Russia spans 11 time zones — Moscow is in the western part"],
  ["what is largest continent|largest continent asia|asia continent", "Asia is the largest continent 🌏\n• Area: ~44.6 million sq km (30% of Earth's land area!)\n• Population: ~4.7 billion (60% of world population!)\n• Highest point: Mount Everest (8,848m)\n• Lowest point: Dead Sea (-430m)\n• Contains: India, China, Japan, Russia (partially), Middle East\n• Has 48 countries — most of any continent"],
  ["smallest continent|australia continent|oceania", "Australia/Oceania is the smallest continent 🦘\n• Area: ~7.7 million sq km\n• Population: ~44 million (smallest populated continent)\n• Australia is both a continent AND a country\n• Famous for: Great Barrier Reef, kangaroos, koalas, Uluru\n• Only continent without glaciers (except Antarctica)\n• Home to many unique animals found NOWHERE else on Earth!"],
  ["ocean between africa australia|indian ocean location", "The Indian Ocean lies between Africa and Australia 🌊\n• 3rd largest ocean in the world\n• Area: ~70.6 million sq km\n• Bordered by: Asia (north), Africa (west), Australia (east), Southern Ocean (south)\n• Contains major shipping routes\n• Warmer than Pacific and Atlantic oceans\n• Indian Ocean Tsunami (2004) was one of the deadliest in history"],
  ["10 x 10 math|10 times 10|hundred", "10 × 10 = 100 📐\n• 10² = 100\n• This is called 10 to the power of 2 (ten squared)\n• 100 is called a perfect square\n• In the decimal system, 10 × 10 = 100, 100 × 10 = 1000 and so on!"],
  ["15 percent of 200|15% 200", "15% of 200 = 30 📊\n• Formula: (15 ÷ 100) × 200\n• = 0.15 × 200\n• = 30 ✅\n• Quick trick: 10% of 200 = 20, then 5% = 10, so 15% = 20+10 = 30!"],
  ["square of 12|12 squared|12²", "12² = 144 📐\n• 12 × 12 = 144\n• 144 is a perfect square\n• Also: 12 is a dozen — 144 is a GROSS (12 dozens)!\n• √144 = 12 ✅"],
  ["cube of 5|5 cubed|5³", "5³ = 125 📐\n• 5 × 5 × 5 = 125\n• 125 is a perfect cube\n• Cube means multiplying a number by itself 3 times\n• Other perfect cubes: 1, 8, 27, 64, 125, 216, 343..."],
  ["100 divided by 4|100÷4|100 divide 4", "100 ÷ 4 = 25 📐\n• 4 × 25 = 100 ✅\n• Or: 100 ÷ 2 = 50, then 50 ÷ 2 = 25\n• 25 is also 5² (five squared)"],
  ["area of square|square area formula", "Area of a Square = Side × Side (s²) 📐\n• Formula: A = s²\n• Example: Square with side 5cm → Area = 5 × 5 = 25 cm²\n• Units are always squared (cm², m², km²)\n• Perimeter of a square = 4 × side"],
  ["perimeter of rectangle|rectangle perimeter formula", "Perimeter of a Rectangle = 2(Length + Width) 📐\n• Formula: P = 2(L + W)\n• Example: Rectangle 8cm × 5cm → P = 2(8+5) = 2×13 = 26 cm\n• Perimeter = total distance around the boundary\n• Area of rectangle = Length × Width"],
  ["7 squared|7²|seven squared", "7² = 49 📐\n• 7 × 7 = 49\n• 49 is a perfect square\n• √49 = 7\n• Memory trick: 7 × 7 = 49 = 'Lucky 7 squared!'"],
  ["square root of 81|√81|root 81", "√81 = 9 📐\n• Because 9 × 9 = 81\n• 81 is a perfect square\n• Other nearby perfect squares: 64 (8²), 81 (9²), 100 (10²)\n• Quick check: 9² = 81 ✅"],
  ["what is computer virus|virus computer|malware", "A computer virus is malicious software that damages or disrupts systems 🦠\n• Can: Delete files, steal data, slow down computer, spread to other devices\n• Types: Trojan, Ransomware, Worm, Spyware, Adware\n• How it spreads: Infected emails, USB drives, malicious websites, pirated software\n• Protection: Install antivirus, keep software updated, don't click suspicious links\n• Famous viruses: ILOVEYOU (2000), WannaCry (2017), Stuxnet"],
],

// MATH ENGINE
// ============================================================
function solveMath(input) {
  const s = input.toLowerCase().replace(/,/g,'');

  // multiplication table
  const tableMatch = s.match(/(\d+)\s*[×x\*]\s*(\d+)/);
  if (tableMatch) {
    const a = parseFloat(tableMatch[1]), b = parseFloat(tableMatch[2]);
    return `📐 <span class="hi">${a} × ${b} = ${a*b}</span>\n\n<span class="step-label">Step-by-step:</span>\n${a} multiplied by ${b} equals <b>${a*b}</b>`;
  }

  // percentage
  const pctMatch = s.match(/(\d+\.?\d*)\s*%\s*of\s*(\d+\.?\d*)/);
  if (pctMatch) {
    const pct = parseFloat(pctMatch[1]), num = parseFloat(pctMatch[2]);
    const result = (pct/100)*num;
    return `📊 <span class="hi">${pct}% of ${num} = ${result}</span>\n\n<span class="step-label">Step-by-step:</span>\nFormula: (${pct}/100) × ${num}\n= 0.${pct<=9?'0'+pct:pct} × ${num}\n= <b>${result}</b>`;
  }

  // square root
  const sqrtMatch = s.match(/(?:square root|sqrt|√)\s*(?:of\s*)?(\d+\.?\d*)/);
  if (sqrtMatch) {
    const n = parseFloat(sqrtMatch[1]);
    const result = Math.sqrt(n);
    return `📐 <span class="hi">√${n} = ${result % 1 === 0 ? result : result.toFixed(4)}</span>\n\n<span class="step-label">Explanation:</span>\nThe square root of ${n} is the number which when multiplied by itself gives ${n}.\n√${n} = <b>${result % 1 === 0 ? result : result.toFixed(4)}</b>`;
  }

  // cube root
  const cbrtMatch = s.match(/(?:cube root|cbrt|∛)\s*(?:of\s*)?(\d+\.?\d*)/);
  if (cbrtMatch) {
    const n = parseFloat(cbrtMatch[1]);
    const result = Math.cbrt(n);
    return `📐 <span class="hi">∛${n} = ${result % 1 === 0 ? result : result.toFixed(4)}</span>\n\n<span class="step-label">Explanation:</span>\nThe cube root of ${n} is the number which when multiplied by itself 3 times gives ${n}.\n∛${n} = <b>${result % 1 === 0 ? result : result.toFixed(4)}</b>`;
  }

  // LCM
  const lcmMatch = s.match(/lcm\s*(?:of\s*)?(\d+)\s*[,\s&and]+\s*(\d+)/);
  if (lcmMatch) {
    const a = parseInt(lcmMatch[1]), b = parseInt(lcmMatch[2]);
    function gcd(x,y){return y===0?x:gcd(y,x%y);}
    const result = (a*b)/gcd(a,b);
    return `📐 <span class="hi">LCM(${a}, ${b}) = ${result}</span>\n\n<span class="step-label">Step-by-step:</span>\nFormula: LCM = (a × b) / HCF\nHCF(${a},${b}) = ${gcd(a,b)}\nLCM = (${a} × ${b}) / ${gcd(a,b)}\nLCM = ${a*b} / ${gcd(a,b)}\nLCM = <b>${result}</b>`;
  }

  // HCF
  const hcfMatch = s.match(/(?:hcf|gcd)\s*(?:of\s*)?(\d+)\s*[,\s&and]+\s*(\d+)/);
  if (hcfMatch) {
    const a = parseInt(hcfMatch[1]), b = parseInt(hcfMatch[2]);
    function gcd2(x,y){return y===0?x:gcd2(y,x%y);}
    const result = gcd2(a,b);
    return `📐 <span class="hi">HCF(${a}, ${b}) = ${result}</span>\n\n<span class="step-label">Step-by-step (Euclidean Algorithm):</span>\nHCF(${a}, ${b}) = HCF(${b}, ${a%b})\n= HCF(${Math.min(a,b)}, ${Math.max(a,b)%Math.min(a,b)})\n= <b>${result}</b>`;
  }

  // Simple arithmetic with operators
  const arithMatch = s.match(/(-?\d+\.?\d*)\s*([+\-÷/])\s*(-?\d+\.?\d*)/);
  if (arithMatch) {
    const a = parseFloat(arithMatch[1]);
    const op = arithMatch[2];
    const b = parseFloat(arithMatch[3]);
    let result, opWord;
    if (op === '+') { result = a+b; opWord = 'Addition'; }
    else if (op === '-') { result = a-b; opWord = 'Subtraction'; }
    else if (op === '÷' || op === '/') { result = b!==0 ? a/b : 'undefined (can\'t divide by zero!)'; opWord = 'Division'; }
    return `📐 <span class="hi">${a} ${op} ${b} = ${typeof result === 'number' ? (result%1===0?result:result.toFixed(4)) : result}</span>\n\n<span class="step-label">${opWord}:</span>\n${a} ${op} ${b} = <b>${typeof result === 'number' ? (result%1===0?result:result.toFixed(4)) : result}</b>`;
  }

  // Power/exponent
  const powerMatch = s.match(/(-?\d+\.?\d*)\s*(?:\^|to the power of|raised to)\s*(-?\d+\.?\d*)/);
  if (powerMatch) {
    const base = parseFloat(powerMatch[1]);
    const exp = parseFloat(powerMatch[2]);
    const result = Math.pow(base, exp);
    return `📐 <span class="hi">${base}^${exp} = ${result}</span>\n\n<span class="step-label">Explanation:</span>\n${base} raised to the power of ${exp} = <b>${result}</b>`;
  }

  return null;
}

// ============================================================
// GREETING DETECTION  (FIX #1 — stricter, not over-triggered)
// ============================================================
function isGreeting(input) {
  // Only match if the ENTIRE message is essentially a greeting
  // Prevents "how are stars formed" from triggering greeting
  const norm = input.toLowerCase().replace(/[?!.,''""]/g,'').trim();
  const greetExact = ['hi','hello','hey','sup','hiya','namaste','namaskar','good morning','good afternoon','good evening','good night','how are you','how do you do','whats up',"what's up",'yo'];
  // Must be a short message (<=5 words) AND match a greeting pattern
  const wordCount = norm.split(/\s+/).length;
  if (wordCount > 5) return false; // Long messages are never just greetings
  return greetExact.some(g => norm === g || norm.startsWith(g + ' ') || norm.endsWith(' ' + g));
}

// ============================================================
// NORMALIZE  (FIX #5 - typo/abbreviation handling)
// ============================================================
function normalize(str) {
  let s = str.toLowerCase().replace(/[?!.,‘’“”]/g,'').replace(/\s+/g,' ').trim();
  // Common typo corrections for fuzzy matching
  const fixes = {'r u':'are you','hru':'how are you','wht':'what','ur':'your','pls':'please','plz':'please','bcz':'because','coz':'because'};
  s = s.split(' ').map(w => fixes[w] || w).join(' ');
  return s;
}

function searchKeywordBrain(norm) {
  for (const [keys, answer] of Object.entries(keywordBrain)) {
    const keyList = keys.split('|');
    if (keyList.some(k => norm.includes(k))) return answer;
  }
  return null;
}

// ============================================================
// FIND ANSWER — with Priority System (Upgrade 3)
// ============================================================
function findAnswer(input) {
  const norm = normalize(input);

  // P1: Math engine (highest priority)
  const mathResult = solveMath(input);
  if (mathResult) return mathResult;

  // P1.5: User name storage
  const nameMatch = norm.match(/my name is (\w+)/);
  if (nameMatch) {
    userMemory.name = nameMatch[1];
    saveMemory();
    return `Nice to meet you, <b>${nameMatch[1]}</b>! 💕 I'll remember your name! What would you like to learn today?`;
  }
  const callMeMatch = norm.match(/call me (\w+)/);
  if (callMeMatch) {
    userMemory.name = callMeMatch[1];
    saveMemory();
    return `Got it! I'll call you <b>${callMeMatch[1]}</b> from now on! 💕 What shall we study today?`;
  }

  // P1.6: "what you don't know" / "what have you learned"
  if (norm.includes("what you don") || norm.includes("what dont you") || norm.includes("things you don")) {
    if (learnedKnowledge.length === 0)
      return "You haven't taught me anything yet! 💕 But whenever I don't know something, I'll ask you. Just reply with the answer! 🌟";
    let list = learnedKnowledge.map((e,i) => `${i+1}. ${e.q}`).join('<br>');
    return `Things I've learned from you so far 💕<br><br>${list}<br><br>You're my best teacher! 🌟`;
  }

  // P2: Keyword Brain (Upgrade 1 — handles rephrased questions)
  const kwResult = searchKeywordBrain(norm);
  if (kwResult) return kwResult;

  // P3: Full form direct match
  const ffMatch = norm.match(/full form of (.+)/);
  if (ffMatch) {
    const query = ffMatch[1].trim();
    for (const [key, val] of knowledge.full_forms) {
      if (key.includes(query) || query.includes(key.replace('full form of ',''))) return val;
    }
  }

  // P4: EXACT match scan — search ALL categories including greetings + romantic_chat
  // This ensures custom Q&A you added always gets found first
  const ALL_CATS = ['greetings','romantic_chat',...PRIORITY_CATS];
  for (const cat of ALL_CATS) {
    if (!knowledge[cat]) continue;
    for (const [key, val] of knowledge[cat]) {
      if (normalize(key) === norm) return val; // perfect exact match
    }
  }

  // P4b: "what is your X" / "who is your X" — search romantic_chat + greetings first
  const whatMatch = norm.match(/^(?:what is|what are|who is|who was|who are|tell me about|explain|teach me about|short notes on|notes on|how old|what is your|who is your|do you have a|are you|can you|do you|will you|i like|you are|i love)\s+(.+)/);
  if (whatMatch) {
    const query = normalize(whatMatch[1]);
    // First check romantic_chat and greetings for personal questions
    for (const cat of ['romantic_chat','greetings']) {
      if (!knowledge[cat]) continue;
      for (const [key, val] of knowledge[cat]) {
        const normKey = normalize(key);
        if (normKey === norm || normKey === query || query.includes(normKey) || normKey.includes(query)) return val;
      }
    }
    // Then check knowledge categories
    const knowledgeCats = ['mathematics','science','assam_gk','india_gk','geography','full_forms','study_helper','motivation',...PRIORITY_CATS];
    for (const cat of knowledgeCats) {
      if (!knowledge[cat] || cat === 'romantic_chat' || cat === 'greetings') continue;
      for (const [key, val] of knowledge[cat]) {
        const normKey = normalize(key);
        if (normKey === query || query.includes(normKey) || normKey.includes(query)) return val;
      }
    }
  }

  // P5: Determine scan categories based on question type
  const isKnowledgeQ = /^(what|who|which|where|when|how|explain|tell me|define|describe|teach|why|full form|is|are|was|were|did|does|do)/i.test(input.trim());
  // Always include romantic_chat + greetings in scan for personal/chat messages
  const isPersonalQ = /^(are you|do you|can you|will you|i like|i love|you are|am i|tell me something)/i.test(norm);
  const scanCats = isKnowledgeQ && !isPersonalQ
    ? ['mathematics','extra_maths','extra_science','science','assam_gk','india_gk','geography','full_forms','study_helper','motivation','history','technology','world_knowledge']
    : ['romantic_chat','greetings','study_helper',...PRIORITY_CATS];

  // P6: Keyword scoring — priority ordered across selected categories
  let bestMatch = null, bestScore = 0, bestCatRank = 999;
  for (let ci = 0; ci < scanCats.length; ci++) {
    const cat = scanCats[ci];
    if (!knowledge[cat]) continue;
    for (const [key, val] of knowledge[cat]) {
      const normKey = normalize(key);
      // Exact or contained match gets max score
      if (normKey === norm || norm.includes(normKey) || normKey.includes(norm)) {
        return val; // instant return on strong match
      }
      const words = normKey.split(' ').filter(w => w.length > 2);
      let score = 0;
      words.forEach(w => { if (norm.includes(w)) score++; });
      const relScore = words.length > 0 ? score / words.length : 0;
      if (score >= 1 && relScore >= 0.3 && (score > bestScore || (score === bestScore && ci < bestCatRank))) {
        bestScore = score; bestMatch = val; bestCatRank = ci;
      }
    }
  }
  if (bestMatch) return bestMatch;

  // P7: Learned knowledge from user
  for (const entry of learnedKnowledge) {
    const normQ = normalize(entry.q);
    const words = normQ.split(' ').filter(w => w.length > 2);
    if (norm.includes(normQ) || normQ.includes(norm) || words.some(w => norm.includes(w))) {
      return `I learned this from you! 💕<br><b>Answer:</b> ${entry.a}`;
    }
  }

  return null;
}

// ============================================================
// SELF-LEARNING SYSTEM — Upgrade 4 (stronger)
// ============================================================
let waitingToLearn = false, lastUnknownQ = '';

function processLearning(input) {
  const low = input.toLowerCase().trim();

  const teachPatterns = [
    /^the answer is\s+(.+)/i,
    /^answer is\s+(.+)/i,
    /^it is\s+(.+)/i,
    /^its\s+(.+)/i,
    /^that is\s+(.+)/i,
    /^thats\s+(.+)/i,
    /^means\s+(.+)/i,
    /^(.+)\s+means\s+(.+)/i,
    /^(.+)\s+is\s+(.+)/i,
  ];

  for (const pat of teachPatterns) {
    const m = input.match(pat);
    if (m && lastUnknownQ) {
      const answer = (m[2] ? m[1] + ' is ' + m[2] : m[1]).trim();
      learnedKnowledge.push({q: lastUnknownQ, a: answer});
      saveMemory();
      waitingToLearn = false;
      const oldQ = lastUnknownQ; lastUnknownQ = '';
      return `Thank you! 💕 Saved!<br><b>Q:</b> ${oldQ}<br><b>A:</b> ${answer}<br><br>I'll remember this forever! 🌟`;
    }
  }

  // Auto-learn if waiting and reply is substantial (not a new question)
  const looksLikeQuestion = /^(what|who|which|where|when|how|why|is|are|was|were|did|does|do|tell|show)/i.test(input.trim());
  if (waitingToLearn && lastUnknownQ && input.length > 6 && !looksLikeQuestion &&
      !low.startsWith('no') && !low.startsWith('skip') && !low.startsWith('next')) {
    learnedKnowledge.push({q: lastUnknownQ, a: input.trim()});
    saveMemory();
    waitingToLearn = false;
    const oldQ = lastUnknownQ; lastUnknownQ = '';
    return `Got it! 🌸 Saved!<br><b>Q:</b> ${oldQ}<br><b>A:</b> ${input.trim()}<br><br>Thank you for teaching me! 💕`;
  }

  return null;
}
// ============================================================
// QUIZ SYSTEM
// ============================================================
let usedQuizIdx = new Set();

function getQuiz() {
  if (usedQuizIdx.size >= quizBank.length) usedQuizIdx.clear();
  let idx;
  do { idx = Math.floor(Math.random() * quizBank.length); } while (usedQuizIdx.has(idx));
  usedQuizIdx.add(idx);
  return {quiz: quizBank[idx], idx};
}

function renderQuiz(quizObj, idx) {
  const q = quizObj.quiz;
  let html = `<div class="quiz-card"><div class="quiz-question">🎯 Question: ${q.q}</div>`;
  q.options.forEach((opt,i) => {
    html += `<button class="quiz-option" onclick="checkQuiz(this,${i},${q.ans},${idx})">${String.fromCharCode(65+i)}) ${opt}</button>`;
  });
  html += `</div>`;
  return html;
}

function checkQuiz(btn, selected, correct, qIdx) {
  const card = btn.closest('.quiz-card');
  const buttons = card.querySelectorAll('.quiz-option');
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === selected) b.classList.add('wrong');
  });
  const q = quizBank[qIdx];
  const isRight = selected === correct;
  if (isRight) quizScore++;
  quizTotal++;
  categoryQuizCount++;

  setTimeout(() => {
    const resultMsg = isRight
      ? `🎉 Correct! The answer is: <b>${q.options[correct]}</b>! 💕`
      : `Not quite! 😊 Correct answer: <b>${q.options[correct]}</b>. Keep going! 💕`;

    // Show score card after 5 questions in category mode OR show progress
    const inCatMode = quizContinuous || (quizCategory && categoryQuizCount <= categoryQuizMax);
    if (inCatMode && categoryQuizCount >= categoryQuizMax && !quizContinuous) {
      // Show final score card
      const pct = Math.round((quizScore / quizTotal) * 100);
      const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : '📚';
      addAIMessage(resultMsg + `\n\n${emoji} <b>Quiz Complete!</b>\n\nYour Score: <b>${quizScore} / ${quizTotal}</b> (${pct}%)\n\n${pct >= 80 ? 'Outstanding! 🌟 You are brilliant!' : pct >= 60 ? 'Good job! 💪 Keep practising!' : 'Keep studying! 💕 You will get better!'}\n\nSay "start quiz" for another round!`);
      quizScore = 0; quizTotal = 0; categoryQuizCount = 0; quizCategory = null;
    } else if (quizContinuous) {
      // Continuous mode: show progress + auto next question
      addAIMessage(resultMsg + `\n\n📊 Score so far: <b>${quizScore} / ${quizTotal}</b> | Say "stop quiz" to end.`);
      setTimeout(() => {
        const {quiz, idx} = getQuiz();
        addAIMessage(renderQuiz(quiz, idx), true);
      }, 1200);
    } else {
      addAIMessage(resultMsg + `\n\n📊 Score: ${quizScore} / ${quizTotal} | Say "next question" or "quiz me" for more!`);
    }
  }, 600);
}

// ── Category quiz launcher
function startCategoryQuiz(cat) {
  quizCategory = cat;
  categoryQuizCount = 0;
  quizScore = 0;
  quizTotal = 0;
  quizContinuous = false;
  const catBankRaw = quizBank.filter(q => !q.cat || q.cat === cat || cat === 'all');
  // Use all if cat not found
  const catBank = catBankRaw.length >= 3 ? catBankRaw : quizBank;
  categoryQuizMax = 5;

  addAIMessage(`🎯 Starting <b>${cat.toUpperCase()}</b> Quiz! 5 questions coming up! Good luck${userMemory.name ? ', ' + userMemory.name : ''}! 💕`);
  setTimeout(() => {
    const {quiz, idx} = getQuiz();
    addAIMessage(renderQuiz(quiz, idx), true);
  }, 800);
}

function addAIMessage(text, isHTML = false) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-ai';

  const msgCol = document.createElement('div');
  msgCol.className = 'msg-col';

  const timeDiv = document.createElement('div');
  timeDiv.className = 'msg-time';
  timeDiv.textContent = getTime();

  // ── Per-message Copy button
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = '📋 Copy';
  copyBtn.title = 'Copy this message';
  copyBtn.onclick = function() {
    const txt = bubble.innerText || bubble.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(() => {
        copyBtn.innerHTML = '✅ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; copyBtn.classList.remove('copied'); }, 2000);
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.innerHTML = '✅ Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; copyBtn.classList.remove('copied'); }, 2000);
    }
  };

  msgCol.appendChild(bubble);
  msgCol.appendChild(copyBtn);
  msgCol.appendChild(timeDiv);

  const avatar = document.createElement('img');
  avatar.className = 'avatar-img';
  avatar.src = AI_AVATAR;
  avatar.onerror = function() { this.src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><circle cx='18' cy='18' r='18' fill='%23f48fb1'/><text x='18' y='23' font-size='14' text-anchor='middle' fill='white'>✨</text></svg>"; };

  row.appendChild(avatar);
  row.appendChild(msgCol);
  chatArea.appendChild(row);

  if (isHTML) {
    bubble.innerHTML = text;
  } else {
    const formatted = text.replace(/\n/g,'<br>');
    typewriterEffect(bubble, formatted);
  }
  scrollDown();
}

// ── Copy Full Chat function
function copyFullChat() {
  const rows = document.querySelectorAll('.msg-row');
  let text = '=== Apsara AI Chat ===\n\n';
  rows.forEach(function(row) {
    const isUser = row.classList.contains('user');
    const b = row.querySelector('.bubble');
    if (b) {
      text += '[' + (isUser ? 'You' : 'Apsara AI') + ']: ' + (b.innerText || b.textContent) + '\n\n';
    }
  });
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('.copy-chat-btn');
      if (btn) { var orig = btn.innerHTML; btn.innerHTML = '✅ Copied!'; setTimeout(function(){ btn.innerHTML = orig; }, 2500); }
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    var btn = document.querySelector('.copy-chat-btn');
    if (btn) { var orig = btn.innerHTML; btn.innerHTML = '✅ Copied!'; setTimeout(function(){ btn.innerHTML = orig; }, 2500); }
  }
}

function typewriterEffect(el, html) {
  // Simple word-by-word for plain, char-by-char for short
  el.innerHTML = '';
  const words = html.split(' ');
  let i = 0;
  const interval = setInterval(() => {
    if (i < words.length) {
      el.innerHTML += (i > 0 ? ' ' : '') + words[i];
      i++;
      scrollDown();
    } else clearInterval(interval);
  }, 25);
}

function addAIMessageQuiz(html) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <img class="avatar-img" src="${AI_AVATAR}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2236%22 height=%2236%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22%23f48fb1%22/><text x=%2218%22 y=%2223%22 font-size=%2214%22 text-anchor=%22middle%22 fill=%22white%22>✨</text></svg>'">
    <div class="msg-col">
      <div class="bubble bubble-ai">${html}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  chatArea.appendChild(row);
  scrollDown();
}

function scrollDown() {
  chatArea.scrollTop = chatArea.scrollHeight;
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 100);
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 400);
}

// ============================================================
// CONVERSATION STATE  (FIX #2, #6 — context memory + intent engine)
// ============================================================
const convState = {
  greetingDone: false,        // FIX #1/#8: show greeting only once
  mode: null,                 // 'quiz'|'category_quiz'|'chat'|null
  category: null,             // current active category
  lastIntent: null,           // last detected intent
  messageCount: 0,            // total messages sent
};

// FIX #6: Intent classifier — detects what user WANTS to do
function detectIntent(norm) {
  // Quiz intents
  if (/\b(quiz me|test me|ask me|start quiz|give me a question|questions? you know|ask questions?|i want a quiz|quiz time)\b/.test(norm))
    return 'start_quiz';
  if (/\b(ask\s*(me\s*)?(gk|science|geography|history|math|assam|india|technology)\s*(questions?)?|(gk|science|geography|history|math|assam|india|technology)\s*(quiz|questions?))\b/.test(norm))
    return 'category_quiz';
  if (/\b(non.?stop|continuous|keep asking|dont stop|don'?t stop)\b/.test(norm))
    return 'continuous_quiz';
  if (/\b(next (question|q)|another question|more questions?)\b/.test(norm))
    return 'next_question';
  if (/\b(stop quiz|end quiz|stop questions|enough questions)\b/.test(norm))
    return 'stop_quiz';

  // Knowledge intents
  if (/^(what|who|which|where|when|how|explain|tell me about|define|describe|teach|why|full form|is |are |was |were |did |does |do )/.test(norm))
    return 'knowledge';

  // Greeting intent
  if (isGreeting(norm)) return 'greeting';

  // Special intents
  if (/\b(joke|funny|make me laugh)\b/.test(norm)) return 'joke';
  if (/\b(story|short story)\b/.test(norm)) return 'story';
  if (/\b(motivat|inspire|quote)\b/.test(norm)) return 'motivation';
  if (/\bmy name is|call me \w/.test(norm)) return 'set_name';

  return 'chat'; // fallback
}

// ============================================================
// RESPONSE GENERATOR  (FIX #6 — proper intent pipeline)
// ============================================================
function generateResponse(input) {
  const norm = normalize(input);
  const name = userMemory.name ? `, ${userMemory.name}` : '';
  convState.messageCount++;

  // ── STEP 0: Self-learning mode takes priority
  if (waitingToLearn) {
    const learned = processLearning(input);
    if (learned) return learned;
    // If user asked a new question while learning was pending, cancel learn mode
    if (/^(what|who|which|where|when|how|why|tell|explain|define)/.test(norm)) {
      waitingToLearn = false; lastUnknownQ = '';
    }
  }

  // ── STEP 1: "What have you learned from me"
  if (norm.includes('what have you learned') || norm.includes('what did i teach') || norm.includes('learned from me') || norm.includes('you learned from')) {
    if (learnedKnowledge.length === 0) {
      return `You haven't taught me anything yet${name}! 🌱 But whenever I don't know something, I'll ask you. Your knowledge becomes my knowledge! 💕`;
    }
    let list = learnedKnowledge.map((e,i) => `${i+1}. <b>Q:</b> ${e.q}<br><b>A:</b> ${e.a}`).join('<br><br>');
    return `Here's everything I've learned from <b>you</b>${name}! 💕<br><br>${list}<br><br>You're my best teacher! 🌟`;
  }

  // ── STEP 2: Detect intent (FIX #4, #6)
  const intent = detectIntent(norm);

  // ── STEP 3: Handle intents in order of priority

  // -- Quiz answer check (must come before other quiz handling)
  if (quizState) {
    const opt = ['a','b','c','d'];
    const selected = opt.indexOf(norm.trim());
    if (selected !== -1) {
      const q = quizState;
      quizState = null;
      const isRight = selected === q.ans;
      return isRight
        ? `🎉 Correct${name}! The answer is: <b>${q.options[q.ans]}</b>! Brilliant! 💕`
        : `Hmm, not quite! 😊 The correct answer is: <b>${q.options[q.ans]}</b>. Keep going${name}! 💕`;
    }
  }

  // -- Stop quiz
  if (intent === 'stop_quiz' || norm.includes('stop quiz') || norm.includes('end quiz') || norm.includes('stop questions')) {
    quizContinuous = false;
    const pct = quizTotal > 0 ? Math.round((quizScore / quizTotal) * 100) : 0;
    const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : '📚';
    const finalScore = quizTotal;
    const finalCorrect = quizScore;
    quizScore = 0; quizTotal = 0; categoryQuizCount = 0; quizCategory = null;
    convState.mode = null; convState.category = null;
    return `${emoji} Quiz stopped! Final Score: <b>${finalCorrect} / ${finalScore}</b>\n\nThanks for playing${name}! 💕 Say "start quiz" any time!`;
  }

  // -- Continuous quiz mode
  if (intent === 'continuous_quiz') {
    quizContinuous = true; quizScore = 0; quizTotal = 0;
    convState.mode = 'continuous_quiz';
    return {type:'quiz_start_continuous'};
  }

  // -- Category quiz (FIX #2 — stores category in convState)
  if (intent === 'category_quiz') {
    const catMatch = norm.match(/\b(science|gk|geography|history|technology|math|maths|assam|india)\b/);
    if (catMatch) {
      const cat = catMatch[1] === 'maths' ? 'math' : catMatch[1];
      convState.mode = 'category_quiz'; convState.category = cat;
      setTimeout(() => startCategoryQuiz(cat), 50);
      return null;
    }
  }

  // -- General quiz / "ask questions you know" (FIX #4)
  if (intent === 'start_quiz' || intent === 'next_question' || norm === 'quiz') {
    const {quiz, idx} = getQuiz();
    quizState = null;
    convState.mode = 'quiz';
    return {type:'quiz', quiz, idx};
  }

  // -- Jokes
  if (intent === 'joke' || norm.includes('tell me a joke')) {
    const jokes = knowledge.jokes;
    const j1 = jokes[jokeIndex % jokes.length];
    const j2 = jokes[(jokeIndex + 1) % jokes.length];
    jokeIndex = (jokeIndex + 2) % jokes.length;
    return `😄 Here are 2 jokes for you${name}!\n\n1️⃣ ${j1}\n\n2️⃣ ${j2}\n\nWant more? Say 'jokes' again! 💕`;
  }

  // -- Story
  if (intent === 'story') {
    const stories = knowledge.short_stories;
    const s = stories[storyIndex % stories.length];
    storyIndex = (storyIndex + 1) % stories.length;
    return `📖 <b>${s.title}</b>\n\n${s.story}\n\nWant another? Say 'tell me a story'! 💕`;
  }

  // -- Motivation
  if (intent === 'motivation') {
    const quotes = knowledge.motivational_quotes;
    const q1 = quotes[motivationIndex % quotes.length];
    const q2 = quotes[(motivationIndex + 1) % quotes.length];
    motivationIndex = (motivationIndex + 2) % quotes.length;
    return `💪 Here are 2 powerful quotes${name}!\n\n✨ ${q1}\n\n🌟 ${q2}\n\nWant more? Say 'motivate me'! 💕`;
  }

  // -- Greeting (FIX #1/#8 — check custom greetings dataset first, then personality pool)
  if (intent === 'greeting') {
    if (norm.includes('how are you') || norm.includes('how do you do')) {
      const pool = personalityPools.howAreYou;
      return pool[Math.floor(Math.random()*pool.length)]();
    }
    // Check custom greetings dataset for exact/close match first
    if (knowledge.greetings) {
      for (const [key, val] of knowledge.greetings) {
        if (normalize(key) === norm || norm.includes(normalize(key)) || normalize(key).includes(norm)) return val;
      }
    }
    if (!convState.greetingDone) {
      // First greeting: full welcome message
      convState.greetingDone = true;
      const pool = personalityPools.greet;
      return pool[Math.floor(Math.random()*pool.length)](name);
    } else {
      // Subsequent greetings: short ack (FIX #8 — no repeated personality spam)
      const shortAcks = [
        `Hey${name}! 😊 What would you like to know?`,
        `Hi again${name}! 💕 What can I help you with?`,
        `Hello${name}! ✨ Ask me anything!`,
        `👋 What's on your mind${name}?`,
      ];
      return shortAcks[Math.floor(Math.random()*shortAcks.length)];
    }
  }

  // -- Romantic/personal chat — direct dataset match before generic fallback
  // Covers "i love you", "you are cute", "who are you", "are you my friend" etc.
  if (intent === 'chat' || norm.length < 60) {
    const chatCats = ['romantic_chat', 'greetings'];
    for (const cat of chatCats) {
      if (!knowledge[cat]) continue;
      for (const [key, val] of knowledge[cat]) {
        const nk = normalize(key);
        if (nk === norm) return val; // exact
        if (norm.includes(nk) && nk.length > 4) return val; // contained
        if (nk.includes(norm) && norm.length > 4) return val; // reverse contained
      }
    }
  }

  // -- Knowledge lookup (FIX #3 — Bihu & all detailed answers via findAnswer)
  const answer = findAnswer(input);
  if (answer) {
    const extras = [`\n\n💕 Hope that helps${name}!`, `\n\n🌟 Keep learning${name}!`, ``,``,``];
    return answer + extras[Math.floor(Math.random()*extras.length)];
  }

  // -- Short/vague input clarification
  const wordCount = input.trim().split(/\s+/).length;
  if (wordCount <= 2 && !norm.match(/^(ok|yes|no|thanks|bye|sure|good|great)$/)) {
    return `Could you give me a bit more detail${name}? 😊 For example, instead of just "<b>${escapeHTML(input)}</b>", ask a full question! 💕`;
  }

  // -- FIX #7: Smart fallback with self-learning
  waitingToLearn = true;
  lastUnknownQ = input;
  const pool = personalityPools.dontKnow;
  return pool[Math.floor(Math.random()*pool.length)](input, name);
}

// ============================================================
// HANDLE SEND
// ============================================================
function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addUserMessage(text);
  const typingRow = showTyping();

  const delay = 600 + Math.random() * 400;
  setTimeout(() => {
    removeTyping();
    const response = generateResponse(text);
    
    if (typeof response === 'object' && response.type === 'quiz') {
      addAIMessage(`Let's play a quiz${userMemory.name ? ', '+userMemory.name : ''}! 🎯 Here's your question:`, true);
      setTimeout(() => {
        addAIMessageQuiz(renderQuiz(response, response.idx));
      }, 300);
    } else {
      addAIMessage(response, response.includes('<b>') || response.includes('<br>') || response.includes('class='));
    }
  }, delay);
}

function sendChip(text) {
  document.getElementById('userInput').value = text;
  handleSend();
}

// Enter key
document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSend();
