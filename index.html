<style>
  :root {
    --pink-50: #fff0f6;
    --pink-100: #ffe0ee;
    --pink-200: #ffb3d1;
    --pink-300: #ff80b3;
    --pink-400: #ff4d94;
    --pink-500: #e91e8c;
    --pink-600: #c2185b;
    --rose: #f06292;
    --gold: #d4af37;
    --white: #ffffff;
    --text-dark: #2d1b36;
    --text-mid: #6b3d6b;
    --text-light: #b39ab3;
    --bubble-ai: #ffffff;
    --bubble-user: linear-gradient(135deg, #f06292, #e91e8c);
    --shadow: 0 8px 32px rgba(233,30,140,0.12);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--pink-50);
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Decorative BG */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:

      radial-gradient(ellipse at 80% 100%, rgba(233,30,140,0.13) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(255,179,209,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1.5px solid var(--pink-100);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 20px rgba(233,30,140,0.08);
  }

  .header-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 3px solid var(--pink-300);
    object-fit: cover;
    box-shadow: 0 0 0 4px var(--pink-100);
  }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--pink-600);
    letter-spacing: 0.3px;
  }
  .header-subtitle {
    font-size: 0.72rem; color: var(--text-mid);
    font-weight: 500;
  }

  .header-badge {
    background: var(--pink-100);
    color: var(--pink-600);
    font-size: 0.65rem; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--pink-200);
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #4caf50; border-radius: 50%;
    box-shadow: 0 0 6px rgba(76,175,80,0.7);
    animation: pulse-dot 2s infinite;
    display: inline-block; margin-right: 4px;
  }

  @keyframes pulse-dot {
    0%,100%{box-shadow:0 0 6px rgba(76,175,80,0.7);}
    50%{box-shadow:0 0 12px rgba(76,175,80,1);}
  }

  /* QUICK TOPICS BAR */
  .topics-bar {
    position: fixed; top: 70px; left: 0; right: 0; z-index: 99;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--pink-100);
    padding: 7px 16px;
    display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none;
  }
  .topics-bar::-webkit-scrollbar { display: none; }

  .topic-chip {
    flex-shrink: 0;
    background: var(--white);
    border: 1.5px solid var(--pink-200);
    color: var(--pink-600);
    font-size: 0.7rem; font-weight: 700;
    padding: 5px 12px; border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .topic-chip:hover, .topic-chip:active {
    background: var(--pink-500); color: white;
    border-color: var(--pink-500);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(233,30,140,0.3);
  }

  /* CHAT AREA */
  .chat-area {
    position: fixed;
    top: 112px;
    left: 0;
    right: 0;
    bottom: 70px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 16px 24px;
    z-index: 1;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--pink-200); border-radius: 4px; }

  /* MESSAGES */
  .msg-row {
    display: flex; align-items: flex-end; gap: 10px;
    margin-bottom: 16px;
    animation: msg-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes msg-in {
    from { opacity:0; transform: translateY(16px) scale(0.97); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar-img {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--pink-200);
    object-fit: cover;
    flex-shrink: 0;
  }
  .avatar-user {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bubble-user);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    border: 2px solid var(--pink-300);
    flex-shrink: 0;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    line-height: 1.6;
    position: relative;
    word-break: break-word;
  }

  .bubble-ai {
    background: var(--white);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    border: 1px solid var(--pink-100);
  }

  .bubble-user {
    background: linear-gradient(135deg, #f48fb1, #e91e8c);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 6px 20px rgba(233,30,140,0.35);
  }

  .msg-time {
    font-size: 0.62rem;
    color: var(--text-light);
    margin-top: 4px;
    text-align: right;
  }
  .msg-row.ai .msg-time { text-align: left; }

  /* Typing indicator */
  .typing-bubble {
    background: var(--white);
    border: 1px solid var(--pink-100);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot-type {
    width: 7px; height: 7px;
    background: var(--pink-400);
    border-radius: 50%;
    animation: bounce-type 1.2s infinite;
  }
  .dot-type:nth-child(2) { animation-delay: 0.2s; }
  .dot-type:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce-type {
    0%,80%,100%{transform:translateY(0);}
    40%{transform:translateY(-7px);}
  }

  /* Quiz card */
  .quiz-card {
    background: linear-gradient(135deg, var(--pink-50), white);
    border: 2px solid var(--pink-200);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 8px;
  }
  .quiz-question {
    font-weight: 700; color: var(--pink-600);
    margin-bottom: 10px; font-size: 0.9rem;
  }
  .quiz-option {
    background: white;
    border: 1.5px solid var(--pink-200);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-dark);
    transition: all 0.2s;
    display: block; width: 100%;
    text-align: left;
  }
  .quiz-option:hover { background: var(--pink-100); border-color: var(--pink-400); }
  .quiz-option.correct { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
  .quiz-option.wrong { background: #fce4ec; border-color: #e91e63; color: #880e4f; }

  /* Steps list */
  .step-list { margin-top: 6px; }
  .step-list li {
    margin-bottom: 4px; padding-left: 4px;
    color: var(--text-dark);
  }
  .step-list li::marker { color: var(--pink-500); }

  /* INPUT BAR */
  .input-area {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    border-top: 1.5px solid var(--pink-100);
    padding: 12px 16px;
    display: flex; gap: 10px; align-items: center;

  .input-box {
    flex: 1;
    border: 2px solid var(--pink-200);
    border-radius: 25px;
    padding: 11px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }
  .input-box:focus {
    border-color: var(--pink-400);
    box-shadow: 0 0 0 4px rgba(233,30,140,0.1);
  }
  .input-box::placeholder { color: var(--text-light); }

  .send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f48fb1, #e91e8c);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(233,30,140,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;

  .send-btn:active { transform: scale(0.96); }

  .footer {
    display: none;
  }
  .footer span { color: var(--pink-400); }

  /* Suggestion chips above input - hidden */
  .suggestion-chips { display: none; }
  .sug-chip { display: none; }

  /* Copy button */
  .copy-btn {
    background: none; border: 1px solid var(--pink-200);
    color: var(--text-light); font-size: 0.62rem; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; cursor: pointer;
    margin-top: 4px; transition: all 0.2s; display: inline-block;
  }
  .copy-btn:hover { background: var(--pink-100); color: var(--pink-600); border-color: var(--pink-400); }
  .copy-btn.copied { background: var(--pink-500); color: white; border-color: var(--pink-500); }

    position: fixed; bottom: 72px; right: 14px; z-index: 200;
    background: linear-gradient(135deg, #f48fb1, #e91e8c);
    color: white; border: none; border-radius: 22px;
    padding: 7px 14px; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 14px rgba(233,30,140,0.35);
    transition: transform 0.15s;

  /* Score card */
  .score-card {
    background: linear-gradient(135deg, #fff0f6, white);
    border: 2px solid var(--pink-300); border-radius: var(--radius);

  .score-title { font-size: 1.1rem; font-weight: 700; color: var(--pink-600); margin-bottom: 6px; }
  .score-num { font-size: 2rem; font-weight: 700; color: var(--pink-500); }
  .score-sub { font-size: 0.8rem; color: var(--text-mid); margin-top: 4px; }

  .hi { color: var(--pink-600); font-weight: 700; }
  .step-label { 
    font-weight: 700; color: var(--pink-500); 
    display: block; margin-top: 6px;
  }

  @media (max-width: 480px) {
    .bubble { max-width: 88%; font-size: 0.85rem; }
    .header-name { font-size: 0.98rem; }
  }
</style>
</head>

mathematics: [
  // These are pattern-matched via the math engine — below are conceptual Q&As
  ["what is lcm","LCM stands for Least Common Multiple 📐 It's the smallest number divisible by both numbers. Example: LCM(4,6) = 12"],
  ["what is hcf","HCF stands for Highest Common Factor 📐 It's the largest number that divides both numbers. Example: HCF(12,18) = 6"],
  ["what is prime number","A prime number has exactly 2 factors: 1 and itself. Examples: 2, 3, 5, 7, 11, 13, 17, 19, 23... 🔢"],
  ["what is composite number","A composite number has more than 2 factors. Examples: 4, 6, 8, 9, 10, 12... 🔢"],
  ["what is square root","Square root of a number is what you multiply by itself to get that number. √16 = 4 because 4×4=16 📐"],
  ["what is cube root","Cube root of a number is what you multiply by itself 3 times to get that number. ∛27 = 3 because 3×3×3=27 📐"],
  ["what is percentage","Percentage means per hundred. Formula: (Value/Total)×100 📊"],
  ["what is fraction","A fraction represents part of a whole. It has a numerator (top) and denominator (bottom). Example: 3/4 means 3 parts out of 4. 📐"],
  ["what is decimal","A decimal is a number with a dot (decimal point) separating the whole number from the fraction. Example: 3.14 📐"],
  ["what is ratio","Ratio compares two quantities. Example: ratio of 2 to 3 is written as 2:3 📐"],
  ["what is proportion","Proportion states that two ratios are equal. Example: 1:2 = 3:6 📐"],
  ["what is average","Average = Sum of all values ÷ Number of values. Example: Average of 2,4,6 = (2+4+6)/3 = 4 📐"],
  ["what is mean","Mean = Sum of all values ÷ Number of values. Same as average! 📐"],
  ["what is median","Median = Middle value when numbers are arranged in order. Example: 1,3,5 → Median = 3 📐"],
  ["what is mode","Mode = Most frequently occurring value. Example: 1,2,2,3,4 → Mode = 2 📐"],
  ["what is pi","Pi (π) ≈ 3.14159... It's the ratio of a circle's circumference to its diameter. 🔵"],
  ["what is pythagoras","Pythagoras theorem: In a right triangle, a²+b²=c² where c is the hypotenuse. 📐"],
  ["area of circle","Area of circle = πr² where r is the radius. 🔵"],
  ["area of rectangle","Area of rectangle = Length × Width 📏"],
  ["area of triangle","Area of triangle = (1/2) × Base × Height 📐"],
  ["area of square","Area of square = Side × Side = s² 📏"],
  ["perimeter of circle","Perimeter (Circumference) of circle = 2πr 🔵"],
  ["perimeter of rectangle","Perimeter of rectangle = 2(Length + Width) 📏"],
  ["volume of cube","Volume of cube = Side³ = s³ 📦"],
  ["volume of sphere","Volume of sphere = (4/3)πr³ 🔵"],
  ["volume of cylinder","Volume of cylinder = πr²h 🔵"],
  ["simple interest","Simple Interest = (P × R × T) / 100, where P=Principal, R=Rate, T=Time 💰"],
  ["compound interest","Compound Interest = P(1 + R/100)^T - P 💰"],
  ["what is algebra","Algebra uses letters to represent numbers. Example: x + 5 = 10, so x = 5 📐"],
  ["what is equation","An equation shows that two things are equal using the '=' sign. Example: 2x = 10 📐"],
  ["what is bodmas","BODMAS: Brackets → Orders → Division → Multiplication → Addition → Subtraction. This is the order of operations! 📐"],
  ["what is factorial","Factorial of n (written n!) = n×(n-1)×(n-2)×...×1. Example: 5! = 5×4×3×2×1 = 120 🔢"],

science: [
  ["what is photosynthesis","Photosynthesis is the process by which plants make food 🌿\n• Plants use: Sunlight + Water + CO₂\n• They produce: Glucose + Oxygen\n• Formula: 6CO₂ + 6H₂O + Light → C₆H₁₂O₆ + 6O₂\n• Happens in: Chloroplasts (contain chlorophyll)"],
  ["what is respiration","Respiration is how cells produce energy from food 🫁\n• Formula: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + Energy\n• Aerobic: needs oxygen • Anaerobic: without oxygen"],
  ["what is cell","A cell is the basic unit of life 🔬\n• Animal cells: no cell wall, have centrioles\n• Plant cells: have cell wall, chloroplasts, large vacuole\n• Discovered by: Robert Hooke (1665)"],
  ["what is mitosis","Mitosis is cell division that produces 2 identical daughter cells 🔬\n• Stages: Prophase → Metaphase → Anaphase → Telophase\n• Purpose: Growth and repair"],
  ["what is meiosis","Meiosis produces 4 genetically different cells with half the chromosomes 🔬\n• Purpose: Sexual reproduction\n• Happens in: Gonads (testes and ovaries)"],
  ["what is dna","DNA (Deoxyribonucleic Acid) is the genetic material 🧬\n• Shape: Double helix\n• Contains: Genes that determine traits\n• Discovered by: Watson and Crick (1953)\n• Location: Nucleus of cells"],
  ["what is ecosystem","An ecosystem includes all living organisms and their non-living environment 🌍\n• Components: Biotic (living) + Abiotic (non-living)\n• Examples: Forest, ocean, desert"],
  ["what is food chain","A food chain shows how energy flows from one organism to another 🌿→🐛→🐦\n• Starts with: Producers (plants)\n• Then: Consumers (animals)\n• Ends with: Decomposers (fungi, bacteria)"],
  ["what is gravity","Gravity is the force of attraction between masses 🍎\n• Earth's gravity: 9.8 m/s²\n• Discovered by: Isaac Newton\n• Keeps planets in orbit around the Sun"],
  ["what is newton law","Newton's Laws of Motion:\n1️⃣ An object stays at rest or motion unless acted upon by a force\n2️⃣ F = ma (Force = mass × acceleration)\n3️⃣ Every action has an equal and opposite reaction 🚀"],
  ["what is osmosis","Osmosis is the movement of water through a semi-permeable membrane from low concentration to high concentration 💧\n• Example: Plant roots absorbing water"],
  ["what is diffusion","Diffusion is the movement of particles from high concentration to low concentration 💨\n• Example: Smell of perfume spreading in a room"],
  ["what is atom","An atom is the smallest unit of matter ⚛️\n• Parts: Protons (+), Neutrons (neutral), Electrons (-)\n• Nucleus = Protons + Neutrons\n• Electrons orbit the nucleus"],
  ["what is molecule","A molecule is two or more atoms bonded together 🔬\n• Water: H₂O (2 Hydrogen + 1 Oxygen)\n• CO₂: 1 Carbon + 2 Oxygen"],
  ["what is element","An element is a pure substance made of only one type of atom ⚗️\n• 118 elements in the periodic table\n• Examples: Gold (Au), Silver (Ag), Iron (Fe)"],
  ["what is compound","A compound is formed when two or more elements chemically combine ⚗️\n• Examples: Water (H₂O), Salt (NaCl), Sugar (C₁₂H₂₂O₁₁)"],
  ["what is acid","An acid has pH less than 7 ⚗️\n• Characteristics: Sour taste, turns litmus red\n• Examples: HCl (hydrochloric acid), H₂SO₄ (sulphuric acid), vinegar"],
  ["what is base","A base has pH greater than 7 ⚗️\n• Characteristics: Bitter taste, slippery, turns litmus blue\n• Examples: NaOH (sodium hydroxide), baking soda"],
  ["what is salt","A salt forms when an acid reacts with a base ⚗️\n• Example: HCl + NaOH → NaCl (common salt) + H₂O"],
  ["what is ph","pH measures acidity or alkalinity 📊\n• pH 0-6: Acidic • pH 7: Neutral • pH 8-14: Alkaline/Basic\n• Pure water: pH 7"],
  ["what is photon","A photon is a particle of light with no mass and no charge 💡\n• Travels at speed of light: 3×10⁸ m/s"],
  ["what is electron","An electron is a negatively charged particle orbiting the nucleus ⚛️\n• Mass: 9.11×10⁻³¹ kg\n• Charge: -1.6×10⁻¹⁹ C"],
  ["what is nucleus","The nucleus is the control center of the cell 🔬 containing DNA\n• Also: Nucleus of an atom = protons + neutrons"],
  ["what is chlorophyll","Chlorophyll is the green pigment in plants 🌿\n• It absorbs sunlight for photosynthesis\n• Located in: Chloroplasts"],
  ["what is transpiration","Transpiration is the evaporation of water from plant leaves 🌿\n• Through pores called stomata\n• Function: Helps water absorption from roots"],
  ["what is mitochondria","Mitochondria is the powerhouse of the cell 💥\n• Produces ATP (energy)\n• Has its own DNA\n• More in active cells (muscle cells)"],
  ["what is ribosome","Ribosomes are the sites of protein synthesis 🔬\n• Found in both prokaryotes and eukaryotes\n• Location: Cytoplasm and endoplasmic reticulum"],
  ["speed of light","Speed of light in vacuum = 3×10⁸ m/s (300,000 km/s) 💡\n• Nothing travels faster than light!"],
  ["speed of sound","Speed of sound in air ≈ 340 m/s 🔊\n• In water: ≈1500 m/s\n• In solids: Even faster!"],
  ["what is magnetism","Magnetism is the force produced by moving electric charges or magnets 🧲\n• Like poles repel, opposite poles attract\n• Earth is a giant magnet!"],
  ["what is electric current","Electric current is the flow of electrons through a conductor ⚡\n• Unit: Ampere (A)\n• Formula: I = V/R (Ohm's Law)"],
  ["what is voltage","Voltage (potential difference) is the force that drives current ⚡\n• Unit: Volt (V)\n• Formula: V = IR"],
  ["what is resistance","Resistance opposes the flow of electric current ⚡\n• Unit: Ohm (Ω)\n• Formula: R = V/I"],
  ["what is evolution","Evolution is the change in species over generations 🦕\n• Theory by: Charles Darwin\n• Book: 'On the Origin of Species' (1859)\n• Mechanism: Natural selection"],
  ["what is vaccine","A vaccine trains the immune system by exposing it to a weakened pathogen 💉\n• Creates immunity without causing disease\n• First vaccine: Smallpox by Edward Jenner (1796)"],
  ["what is virus","A virus is a microscopic particle that infects living cells 🦠\n• Not alive by itself — needs a host\n• Examples: Flu, HIV, COVID-19, Ebola"],
  ["what is bacteria","Bacteria are single-celled prokaryotic microorganisms 🦠\n• Some are useful (gut bacteria, fermentation)\n• Some cause disease (Tuberculosis, Cholera)"],
  ["what is refraction","Refraction is the bending of light when it passes from one medium to another 💡\n• Example: A straw appearing bent in water"],
  ["what is reflection","Reflection is the bouncing back of light from a surface 💡\n• Example: Mirror images"],
  ["what is convex lens","A convex lens is thicker in the middle and bends light inward (converges) 🔍\n• Uses: Magnifying glass, cameras, eyes"],
  ["what is concave lens","A concave lens is thinner in the middle and spreads light outward (diverges) 🔍\n• Uses: Glasses for short-sightedness"],
  ["what is blood","Blood is the fluid tissue that circulates throughout the body 🩸\n• Components: Red blood cells, White blood cells, Platelets, Plasma\n• Blood groups: A, B, AB, O\n• Universal donor: O- • Universal recipient: AB+"],
  ["what is heart","The heart is a muscular organ that pumps blood 💗\n• 4 chambers: Left/Right Atrium, Left/Right Ventricle\n• Beats: ~70 times per minute\n• Pumps ~5 litres per minute"],
  ["layers of earth","Earth has 4 layers 🌍\n• Crust (outermost) → Mantle → Outer Core → Inner Core\n• Inner core: Solid iron, very hot (~5000°C)"],
  ["what is tectonic plates","Tectonic plates are massive pieces of Earth's crust that move slowly 🌍\n• Their movement causes: Earthquakes and volcanic eruptions"],
  ["what is ecosystem","An ecosystem = all living things + their environment in a specific area 🌿\n• Examples: Rainforest, coral reef, grassland, pond"],
  ["what is biodiversity","Biodiversity = variety of life forms in an ecosystem 🌿\n• High biodiversity = healthy ecosystem"],
  ["greenhouse effect","Greenhouse effect: certain gases trap heat in Earth's atmosphere 🌡️\n• Greenhouse gases: CO₂, CH₄, N₂O, Water vapor\n• Natural process, but increasing due to human activity → Global warming"],
  ["what is ozone layer","The ozone layer is in the stratosphere and absorbs harmful UV rays ☀️\n• Ozone = O₃\n• Damaged by: CFCs (chlorofluorocarbons)"],
  ["what is newton","Newton is the unit of force in SI system 📐\n• 1 Newton = force to accelerate 1 kg at 1 m/s²\n• Named after Sir Isaac Newton"],
  ["what is energy","Energy is the capacity to do work ⚡\n• Types: Kinetic, Potential, Thermal, Chemical, Nuclear, Light, Sound\n• SI unit: Joule (J)\n• Cannot be created or destroyed (Law of Conservation of Energy)"],
  ["what is kinetic energy","Kinetic energy is energy of motion ⚡\n• Formula: KE = ½mv²\n• Depends on: Mass and speed"],
  ["what is potential energy","Potential energy is stored energy based on position ⚡\n• Formula: PE = mgh (gravitational)\n• Example: Water behind a dam, stretched spring"],
  ["what is periodic table","Periodic Table — 118 Elements ⚗️\n• Created by: Dmitri Mendeleev (1869)\n• Arranged by: Atomic number (protons)\n• Periods: Horizontal rows (7 periods)\n• Groups: Vertical columns (18 groups)\n• Group 1: Alkali metals (very reactive)\n• Group 18: Noble gases (very stable)\n• Newest elements: Oganesson (118), Nihonium (113)"],
  ["what is radioactivity","Radioactivity — spontaneous emission from unstable nuclei ☢️\n• Types of radiation:\n  • Alpha (α): Helium nucleus — stopped by paper\n  • Beta (β): Electron — stopped by aluminium\n  • Gamma (γ): Electromagnetic wave — stopped by lead/concrete\n• Discovered by: Henri Becquerel (1896), studied by Marie Curie\n• Uses: Medical imaging, cancer treatment, carbon dating"],
  ["what is nuclear energy","Nuclear Energy ☢️\n• Fission: Splitting heavy atoms (uranium) — used in nuclear power plants\n• Fusion: Merging light atoms (hydrogen) — powers the Sun\n• Einstein's equation: E = mc²\n• Nuclear power: ~10% of world's electricity\n• India's nuclear policy: No-First-Use\n• BARC: Bhabha Atomic Research Centre, Mumbai"],
  ["electromagnetic spectrum","Electromagnetic Spectrum 💡\n• All types of EM radiation by wavelength:\n• Radio waves (longest) → Microwaves → Infrared → Visible Light (VIBGYOR) → Ultraviolet → X-rays → Gamma rays (shortest)\n• Visible light: Only tiny part we can see\n• Infrared: Heat cameras, TV remotes\n• X-rays: Medical imaging\n• Gamma rays: Cancer treatment"],
  ["what is chemical bond","Chemical Bond — force holding atoms together ⚗️\n• Ionic bond: Transfer of electrons (e.g., NaCl — salt)\n• Covalent bond: Sharing of electrons (e.g., H₂O — water)\n• Metallic bond: Sea of free electrons (metals)\n• Electronegativity determines bond type\n• Stronger bonds = more stable compound"],
  ["what is catalyst","Catalyst — speeds up reaction without being consumed ⚗️\n• Lowers activation energy\n• Biological catalysts: Enzymes (speed up reactions in living organisms)\n• Industrial: Iron (Haber Process for ammonia)\n• Platinum: In car catalytic converters (reduces pollution)\n• Inhibitor: Slows down a reaction (opposite of catalyst)"],
  ["what is alloy","Alloy — mixture of two or more metals ⚗️\n• Common alloys:\n  • Steel: Iron + Carbon (stronger than iron)\n  • Stainless steel: Iron + Chromium + Nickel (rust-resistant)\n  • Brass: Copper + Zinc\n  • Bronze: Copper + Tin\n  • Duralumin: Aluminium + Copper (aircraft)\n• Purpose: Improve strength, resistance, appearance"],
  ["what is ph scale","pH Scale — measures acidity/alkalinity 📊\n• Range: 0–14\n• pH < 7: Acidic (lemon=2, vinegar=3)\n• pH = 7: Neutral (pure water)\n• pH > 7: Alkaline/Basic (baking soda=9, bleach=13)\n• Stomach acid: pH ~1.5–3 (very acidic!)\n• Blood: pH 7.35–7.45 (slightly alkaline)\n• Acid rain: pH < 5.6 (damages ecosystems)"],
  ["what is thermodynamics","Thermodynamics — study of heat and energy 🌡️\n• Laws:\n  • 1st Law: Energy cannot be created or destroyed (conservation)\n  • 2nd Law: Heat flows from hot to cold; entropy always increases\n  • 3rd Law: At absolute zero (0K), entropy is minimum\n• Applications: Engines, refrigerators, power plants, climate"],
  ["what is reflection","Reflection of Light 💡\n• Light bounces off a surface\n• Laws: Angle of incidence = Angle of reflection\n• Regular reflection: Mirror/smooth surface\n• Diffuse reflection: Rough surface\n• Plane mirror: Virtual, upright, same size image\n• Concave mirror: Converging (headlights, shaving mirrors)\n• Convex mirror: Diverging (rear-view mirrors — wider field)"],
  ["what is refraction","Refraction of Light 💡\n• Light bends when passing from one medium to another\n• Cause: Change in speed of light in different media\n• Snell's Law: n₁sinθ₁ = n₂sinθ₂\n• Examples: Straw appears bent in water, rainbows, mirages, lenses\n• Total Internal Reflection: Basis of optical fibre communication"],
  ["what is electricity science","Electricity — flow of electric charges ⚡\n• Current (I): Flow of electrons — unit: Ampere (A)\n• Voltage (V): Force driving current — unit: Volt (V)\n• Resistance (R): Opposition to flow — unit: Ohm (Ω)\n• Ohm's Law: V = IR\n• AC (Alternating Current): Homes (India: 220V, 50Hz)\n• DC (Direct Current): Batteries, electronics"],
  ["what is sound science","Sound — longitudinal mechanical wave 🔊\n• Cannot travel in vacuum (needs medium)\n• Speed in air: ~340 m/s\n• Speed in water: ~1,500 m/s (4× faster than air!)\n• Speed in steel: ~5,100 m/s\n• Frequency → Pitch (high/low)\n• Amplitude → Loudness\n• Ultrasound (>20,000 Hz): Used in medical scanning, sonar"],
  ["what is light science","Light — electromagnetic wave 💡\n• Speed in vacuum: 3×10⁸ m/s (fastest in universe)\n• Does not need a medium\n• Visible spectrum: VIBGYOR (Violet to Red)\n• White light = all colours combined\n• Prism splits white light into spectrum\n• Photon: Particle of light (no mass, no charge)"],
  ["archimedes principle","Archimedes Principle 🛁\n• Buoyant force = weight of fluid displaced by object\n• Object floats if: Buoyant force ≥ Weight\n• Object sinks if: Weight > Buoyant force\n• Legend: Archimedes discovered this in his bath — shouted 'Eureka!'\n• Applications: Ships, submarines, hot air balloons"],
  ["what is genetics science","Genetics 🧬\n• Father of Genetics: Gregor Mendel (pea plant experiments)\n• Gene: DNA segment coding for a trait\n• Dominant: Expressed when present (e.g., brown eyes)\n• Recessive: Expressed only with two copies (e.g., blue eyes)\n• Chromosomes: Humans have 46 (23 pairs)\n• Sex chromosomes: XX = Female, XY = Male"],
  ["what is photosynthesis science","Photosynthesis 🌿\n• Equation: 6CO₂ + 6H₂O + Light → C₆H₁₂O₆ + 6O₂\n• Happens in: Chloroplasts (green chlorophyll)\n• Light reactions: In thylakoids — produce ATP, NADPH, release O₂\n• Calvin Cycle (dark reactions): In stroma — fix CO₂ into glucose\n• Limiting factors: Light intensity, CO₂, temperature"],
  ["what is immune system science","Immune System — body's defence 🛡️\n• White blood cells (WBCs): Soldiers of immunity\n• Innate immunity: Natural defence (skin, stomach acid)\n• Adaptive immunity: Learned — creates antibodies against specific pathogens\n• Vaccines: Train immune system without causing disease\n• Antibiotics: Kill bacteria (NOT viruses)\n• Antiviral drugs: Fight viruses"],
  ["what is food chain science","Food Chain and Food Web 🌿\n• Food chain: Sun → Producer → Primary Consumer → Secondary Consumer → Decomposer\n• Example: Grass → Grasshopper → Frog → Snake → Eagle\n• 10% Rule: Only 10% of energy passes to next level\n• Food web: Interconnected food chains\n• Keystone species: Removal collapses entire ecosystem"],
  ["what is cell division","Cell Division 🔬\n• Mitosis: 1 cell → 2 identical cells (growth, repair)\n  • Phases: Prophase → Metaphase → Anaphase → Telophase\n• Meiosis: 1 cell → 4 cells with half chromosomes (sex cells)\n  • Produces sperm and egg cells\n  • Creates genetic variation\n• Cancer: Uncontrolled, abnormal cell division"],
],

  ["ahom kingdom","Ahom Kingdom 👑\n• Founded: 1228 AD by Chaolung Sukaphaa\n• Ruled Assam for ~600 years (1228–1826)\n• Capital: Sivasagar area\n• Defeated: 17 Mughal invasions\n• Great rulers: Lachit Borphukan, Sukaphaa\n• Ended: After Treaty of Yandabo (1826)"],
  ["lachit borphukan","Lachit Borphukan 🗡️\n• Greatest military commander of Ahom Kingdom\n• Famous for: Battle of Saraighat (1671) — defeated Mughal navy\n• Statue on Brahmaputra river, Guwahati\n• Birth anniversary: 24 November = Lachit Divas\n• NDA best cadet gold medal named after him"],

  ["bihu dance assam","Bihu Dance 💃\n• Most popular folk dance of Assam\n• Performed during: Rongali Bihu (April)\n• Movements: Fast hand gestures, hip movements, footwork\n• Instruments: Dhol, Pepa (buffalo horn flute), Gogona (jaw harp), Taal\n• UNESCO Intangible Cultural Heritage consideration"],
  ["majuli island","Majuli Island 🏝️\n• World's largest river island (recognised)\n• Location: Brahmaputra River, Jorhat district\n• Area: ~352 sq km (shrinking due to erosion)\n• Famous for: Vaishnavite Satras (cultural monasteries)\n• Home to: Mising tribe, Deori tribe\n• Declared a district in 2016"],
  ["satras of assam","Satras of Assam 🏛️\n• Vaishnavite monasteries established by Srimanta Sankardeva\n• Centres of: Religion, culture, art, education\n• Famous Satras: Auniati, Kamalabari, Garamur (all in Majuli)\n• Preserve: Borgeet, Ankia Naat, Satriya dance\n• Satriya dance is one of India's 8 classical dances"],
  ["srimanta sankardeva","Srimanta Sankardeva 🙏\n• Great Vaishnavite saint and reformer (1449–1568)\n• Born: Bardowa, Nagaon, Assam\n• Founded: Eka Sarana Nama Dharma (one-God religion)\n• Created: Satras, Borgeet, Ankia Naat, Satriya dance\n• Wrote: Kirtan Ghoxa, Dasama Purana\n• A unifying cultural force in Assam"],
  ["assam tea","Assam Tea 🍵\n• Assam is the world's largest tea-growing region\n• Tea gardens: Dibrugarh, Tinsukia, Jorhat, Golaghat\n• Type: CTC — strong, malty, full-bodied\n• Discovery: Robert Bruce found wild tea plants in 1823\n• Tea industry employs millions in Assam\n• Assam tea goes into breakfast tea blends worldwide"],
  ["brahmaputra river assam","Brahmaputra River in Assam 🌊\n• Enters Assam at: Sadiya, eastern Assam\n• Also called: Luit (Assamese), Tsangpo (Tibet)\n• Length in Assam: ~916 km\n• Width: Up to 18 km in some places!\n• Major cause of annual floods in Assam\n• Dilah/Char: River islands formed by Brahmaputra silt"],
  ["assam silk","Assam Silk 🧵\n• Three famous types:\n  1. Muga silk: Golden, only in Assam — GI tagged, most valuable\n  2. Eri silk: Warm, used for shawls\n  3. Pat silk: White, used for Mekhela Sador\n• Silk weaving is a traditional cottage industry"],
  ["mekhela sador","Mekhela Sador 👗\n• Traditional two-piece garment of Assamese women\n• Mekhela: Lower part (wrapped around waist)\n• Sador: Upper part (draped over shoulder)\n• Made from: Muga silk, Pat silk, or cotton\n• Worn during: Bihu, weddings, cultural events"],
  ["assam districts","Assam has 35 districts 🗺️\n• Divided into 5 divisions: Guwahati, Jorhat, Nagaon, Silchar, Tezpur\n• Largest district by area: Karbi Anglong\n• Most populated: Nagaon\n• Southernmost: Cachar\n• Smallest: Kamrup Metropolitan"],
  ["assam tribes","Major Tribes of Assam 🏹\n• Bodo: Largest plains tribe, Bodoland Territorial Region\n• Karbi: Mainly in Karbi Anglong hills\n• Mising (Miri): Along Brahmaputra, famous for their Bihu\n• Dimasa: Dima Hasao district\n• Rabha: Western Assam\n• Deori: Eastern Assam\n• Tiwa (Lalung): Nagaon, Morigaon\n• Sonowal Kachari: Dibrugarh, Tinsukia"],
  ["assam food","Food of Assam 🍚\n• Staple: Rice and fish (Maas-bhaat)\n• Khar: Traditional dish made with raw papaya and alkali from banana peel\n• Tenga: Sour fish curry\n• Pitha: Rice cake (especially during Bihu)\n• Jolpan: Traditional breakfast — beaten rice, yogurt, gur\n• Duck meat: Specialty of Assam\n• Narikolor Laru: Coconut ball sweet"],
  ["iit guwahati","IIT Guwahati 🎓\n• Established: 1994\n• Location: North Guwahati, banks of Brahmaputra\n• One of the older IITs (6th IIT established)\n• Offers: B.Tech, M.Tech, PhD, MBA\n• Beautiful campus — scenic Brahmaputra views\n• Premier engineering institution of Northeast India"],
  ["assam oil","Oil in Assam ⛽\n• Digboi: Site of Asia's first oil well (1889)\n• Digboi Refinery: Oldest operating refinery in Asia\n• Major oil fields: Digboi, Naharkatia, Moran, Lakwa\n• OIL India Limited: Headquarters in Duliajan, Assam\n• Assam was India's main oil producer for decades"],
  ["digboi oil refinery","Digboi Oil Refinery ⛽\n• Location: Digboi, Tinsukia district\n• Asia's oldest oil refinery (operating since 1901)\n• First oil struck: 1889\n• Operated by: Indian Oil Corporation (IOC)\n• Name origin: British engineers shouted 'Dig, boy! Dig!'"],
  ["bhupen hazarika","Bhupen Hazarika 🎵\n• Greatest singer-composer of Assam\n• Born: 8 September 1926, Sadiya, Assam\n• Died: 5 November 2011\n• Famous songs: 'Dil Hoom Hoom Kare', 'O Ganga Behti Ho'\n• Known as: 'Sudha Kantha' (sweet-throated)\n• Awarded: Bharat Ratna (2019, posthumously), Dada Saheb Phalke (1992)"],
  ["gopinath bordoloi","Gopinath Bordoloi 🏛️\n• First Chief Minister of Assam (1946–1950)\n• Called: 'Lokapriya' (beloved of the people)\n• Ensured Assam remained with India during partition\n• Awarded: Bharat Ratna (1999, posthumously)\n• Born: 6 June 1890, Raha, Nagaon"],
  ["maniram dewan","Maniram Dewan 🗡️\n• First martyr of Assam in 1857 revolt\n• Was a tea planter and merchant\n• Sided with Sepoy Mutiny against British\n• Hanged by British on 26 February 1858\n• Pioneer of tea industry in Assam"],
  ["assam one horned rhino","One-Horned Rhinoceros — Pride of Assam 🦏\n• Scientific name: Rhinoceros unicornis\n• Assam has ~2,500 rhinos = 80% of world population\n• Main habitat: Kaziranga National Park\n• Also found: Pobitora, Orang, Manas\n• Status: Vulnerable (IUCN)\n• Horn made of: Keratin (same as human nails)"],
  ["pobitora wildlife sanctuary","Pobitora Wildlife Sanctuary 🦏\n• Location: Morigaon district, Assam\n• Highest density of Indian one-horned rhinos in the world\n• Area: 38.85 sq km\n• Also has: Wild buffaloes, leopards, birds\n• Easily accessible from Guwahati (~50 km)"],
  ["national parks assam","National Parks of Assam 🌿\n• Kaziranga NP (Nagaon, Golaghat) — UNESCO World Heritage\n• Manas NP (Bodoland) — UNESCO World Heritage\n• Nameri NP (Sonitpur)\n• Dibru-Saikhowa NP (Dibrugarh, Tinsukia)\n• Orang NP (Darrang, Sonitpur)\n• Total: 5 National Parks in Assam"],
  ["assam bodoland","Bodoland Territorial Region (BTR) 🗺️\n• Comprises: Kokrajhar, Chirang, Baksa, Udalguri districts\n• Governed by: Bodoland Territorial Council (BTC)\n• Majority population: Bodo tribe\n• Bodo language is in Schedule 8 of Indian Constitution\n• Bodo Accord signed: 2003 (first) and 2020 (revised)"],
  ["assam language","Languages of Assam 🗣️\n• Official language: Assamese\n• Other official: Bodo, Bengali (Barak valley)\n• Tribal languages: Karbi, Dimasa, Mising, Tiwa, Rabha, Deori\n• Assamese script: Based on Eastern Nagari\n• Assamese is one of India's 22 scheduled languages"],
  ["haflong","Haflong — Mini Switzerland of Assam 🏔️\n• Headquarters of Dima Hasao district\n• Only hill station in Assam\n• Located at ~680 m altitude\n• Haflong Lake is famous\n• Home to Dimasa, Zeme Naga, Hmar tribes"],
  ["hajo assam","Hajo — Multi-Religion Pilgrimage Site 🕌\n• Location: Kamrup district, Assam\n• Hayagriva Madhava Temple: Hindu temple\n• Poa Mecca: Important mosque for Muslims\n• Kedareswara Temple: Shiva temple on hill\n• Unique: Three religions coexist and worship here"],
  ["tezpur assam","Tezpur — Cultural Capital 🏙️\n• Headquarters of Sonitpur district\n• Name: 'Tez' (blood) + 'pur' (city) — from Mahabharata legend\n• Famous for: Agnigarh Hill, Da Parbatia temple ruins\n• Important centre of culture, trade, and education"],
  ["silchar assam","Silchar — Gateway to Barak Valley 🏙️\n• Headquarters of Cachar district\n• Largest city in Barak Valley\n• Language: Bengali is dominant\n• Famous for: Barak Valley language agitation (1961)\n• Silchar airport connects valley to major cities"],
  ["dibrugarh assam","Dibrugarh — Tea City of Assam 🍵\n• Headquarters of Dibrugarh district\n• Called: 'Tea city of the world'\n• Famous for: Tea gardens, oil industry\n• Important river port on Brahmaputra\n• Dibrugarh University is located here"],
  ["jorhat assam","Jorhat — Cultural Heart of Assam 🏙️\n• Headquarters of Jorhat district\n• Gateway to Majuli Island\n• Famous for: Tea industry, proximity to Kaziranga\n• Cultural and intellectual hub\n• Tocklai Tea Research Association: World's oldest tea research centre"],
  ["assam flood","Floods in Assam 🌊\n• Annual problem due to Brahmaputra and its tributaries\n• Causes: Heavy monsoon, Himalayan snowmelt, deforestation\n• Affects: Crops, wildlife (Kaziranga), homes, transport\n• Most affected: Jorhat, Morigaon, Barpeta, Dhubri, Lakhimpur\n• NDRF deployed every year for flood relief"],
  ["assam culture","Culture of Assam 🎭\n• Music: Bihu songs, Borgeet, Husori\n• Dance: Bihu dance, Satriya (classical), Bodo dance, Mising dance\n• Theatre: Ankia Naat (by Sankardeva)\n• Festivals: Bihu, Durga Puja, Eid, Christmas\n• Craft: Silk weaving, Cane & Bamboo, Bell metal\n• Food: Rice, fish, khar, pitha, jolpan"],
  ["assam education","Education in Assam 🎓\n• First university: Gauhati University (1948)\n• IIT Guwahati: Premier engineering institution\n• NIT Silchar: National Institute of Technology\n• Cotton University: Guwahati (Cotton College est. 1901)\n• AIIMS Guwahati: Medical institute\n• Assam University: Silchar"],
  ["guwahati city","Guwahati — Gateway to Northeast India 🏙️\n• Largest city of Assam and entire Northeast India\n• Located on south bank of Brahmaputra\n• Famous spots: Kamakhya Temple, Umananda Island, Assam State Zoo\n• Has IIT Guwahati and Gauhati University\n• Airport: Lokpriya Gopinath Bordoloi International Airport"],
  ["gauhati university","Gauhati University 🎓\n• Established: 1948\n• Location: Jalukbari, Guwahati\n• First university in Assam and Northeast India\n• Oldest university in Northeast\n• Offers: UG, PG, PhD courses\n• Associated colleges: 300+"],
  ["assam economy","Economy of Assam 💰\n• Main sectors: Tea, Oil, Agriculture, Silk\n• Tea: World's largest tea-growing region\n• Oil: Digboi refinery, OIL India Ltd\n• Agriculture: Rice, mustard, jute, vegetables\n• Handicrafts: Cane & bamboo, bell metal, pottery\n• Challenges: Floods, unemployment"],
  ["assam rivers list","Major Rivers of Assam 🌊\n• North bank tributaries: Subansiri, Jia Bharali, Pagladiya, Manas, Beki, Gaurang\n• South bank tributaries: Burhi Dihing, Disang, Kopili, Digaru, Kulsi\n• Southern Assam: Barak and its tributaries Sonai, Katakhal, Jiri\n• All eventually drain into Brahmaputra"],
  ["assam bamboo","Bamboo in Assam 🎋\n• Assam is one of India's largest bamboo-producing states\n• Used for: Furniture, handicrafts, food (bamboo shoots), construction, paper\n• Important for tribal economy\n• Major export commodity from Northeast India"],
  ["assam wildlife","Wildlife of Assam 🐘\n• State animal: One-horned Rhino\n• State bird: White-winged Wood Duck\n• Major parks: Kaziranga, Manas, Dibru-Saikhowa, Nameri, Orang, Pobitora\n• Animals: Tiger, Elephant, Wild Buffalo, Pygmy Hog, Golden Langur\n• Over 700 bird species recorded in Assam"],
  ["assam current cm","Chief Minister of Assam (Current) 🏛️\n• Himanta Biswa Sarma is the current Chief Minister\n• Party: Bharatiya Janata Party (BJP)\n• In office since: May 2021\n• Before: Minister in Congress and then BJP government"],
  ["assam independence","Assam in India's Independence 🇮🇳\n• First freedom fighter: Maniram Dewan (hanged 1858)\n• Gopinath Bordoloi ensured Assam stayed with India during partition\n• Assam officially became part of India on 15 August 1947\n• Northeast underwent major reorganisation in 1963–1987"],
  ["jatinga bird mystery","Jatinga Bird Mystery 🐦\n• Location: Jatinga village, Dima Hasao district, Assam\n• Mystery: Birds fly into village and die on foggy moonless nights (August–October)\n• Scientists' explanation: Birds get disoriented by fog, lights, and seasonal migration\n• Called: 'Valley of death for birds'\n• A rare and mysterious natural phenomenon"],
  ["assam geography","Geography of Assam 🗺️\n• Located in: Northeast India\n• Three regions: Brahmaputra valley, Barak valley, Karbi Anglong & Dima Hasao hills\n• Borders: Arunachal, Nagaland, Manipur, Meghalaya, Tripura, Mizoram, West Bengal, Bhutan, Bangladesh\n• Climate: Tropical monsoon\n• Wettest area: Near Meghalaya border"],
  ["assam nrc","NRC — National Register of Citizens (Assam) 📋\n• Register of legal citizens of India in Assam\n• Updated to identify illegal immigrants\n• Base year: 24 March 1971 (before Bangladesh liberation)\n• Final NRC released: 31 August 2019\n• ~19 lakh people excluded from final NRC"],
  ["diphu assam","Diphu — Headquarters of Karbi Anglong 🏙️\n• Headquarters of Karbi Anglong district\n• Under Karbi Anglong Autonomous Council (KAAC)\n• Predominantly Karbi tribal town\n• Important administrative and commercial centre of hilly Assam"],
  ["hamren assam","Hamren — Headquarters of West Karbi Anglong 🏙️\n• Headquarters of West Karbi Anglong district\n• Scenic hilly town in central Assam\n• Home to Karbi tribe\n• District created in 2016"],
  ["assam bihu importance","Importance of Bihu 🎊\n• Bihu is the cultural identity of Assam\n• Three Bihus mark agricultural seasons and New Year\n• Rongali: Joy, new beginning | Kongali: Prayer for harvest | Bhogali: Gratitude\n• Bihu songs and dances transmitted generation to generation\n• Bihu is recognised as one of India's most important regional festivals"],
  ["dima hasao","Dima Hasao (North Cachar Hills) 🗺️\n• Hill district in southern Assam\n• Headquarters: Haflong\n• Main tribe: Dimasa\n• Also: Zeme Naga, Hmar, Kuki tribes\n• Haflong: Mini-Switzerland of Assam\n• Jatinga: Famous for bird mystery"],
  ["assam history ancient","Ancient History of Assam 📜\n• Ancient name: Pragjyotisha (City of Eastern Light)\n• Later called: Kamarupa\n• Varman Dynasty ruled (~4th–7th century AD)\n• Famous king: Bhaskarvarman (contemporary of Harsha)\n• Xuanzang (Chinese pilgrim) visited Assam in 7th century\n• Kamakhya worship dates back to ancient times"],
  ["assam cotton","Cotton University, Guwahati 🎓\n• Originally: Cotton College (est. 1901 by British)\n• Upgraded to university status: 2017\n• Location: Guwahati (Pan Bazar)\n• One of the oldest and most prestigious colleges in Assam\n• Oldest college in Northeast India"],
  ["assam valley types","Assam's Geographical Valleys 🗺️\n• Brahmaputra Valley: Central and Northern Assam — largest, most fertile\n• Barak Valley: Southern Assam (Cachar, Hailakandi, Karimganj) — Bengali speaking\n• Karbi Hills: Karbi Anglong and West Karbi Anglong — hilly terrain\n• Dima Hasao Hills: Southern Assam — hilly, tribal"],
  ["assam famous food pitha","Pitha — Assamese Rice Cake 🎑\n• Traditional Assamese sweet/snack made from rice flour\n• Especially made during Bhogali Bihu (January)\n• Types: Til Pitha (sesame), Ghila Pitha (fried), Sunga Pitha (bamboo)\n• Made in: Every Assamese household during festivals\n• Shows Assam's rich rice culture"],
  ["assam gauhati high court","Gauhati High Court 🏛️\n• Established: 1948\n• Jurisdiction: Assam, Nagaland, Mizoram, Arunachal Pradesh\n• Located: Guwahati\n• Benches at: Kohima, Aizawl, Itanagar\n• One of the most geographically vast High Court jurisdictions in India"],
  ["assam governance","Government of Assam 🏛️\n• Type: State government within Indian federal system\n• Governor: Appointed by President of India\n• Chief Minister: Head of government\n• Legislature: Assam Legislative Assembly (126 seats)\n• High Court: Gauhati High Court\n• Capital: Dispur (within Guwahati)"],
  ["jyoti prasad agarwala","Jyoti Prasad Agarwala (Rupkonwar) 🎬\n• First Assamese filmmaker\n• Born: 17 June 1903\n• Made: First Assamese film 'Joymati' (1935)\n• Also: Poet, playwright, songwriter\n• Called: Rupkonwar (Handsome Prince)\n• Contributed greatly to Assamese literature and culture"],
  ["bishnuprasad rabha","Bishnuprasad Rabha (Kalaguru) 🎨\n• Born: 31 July 1909, Guwahati\n• Called: Kalaguru (Master of Arts)\n• Multi-talented: Painter, singer, actor, writer, revolutionary\n• Contributed to Assamese music, dance, and literature\n• Was also a political activist\n• Birthday: Celebrated as Kalaguru Divas in Assam"],
  ["assam sports","Sports in Assam 🏆\n• Cricket: Barsapara Cricket Stadium, Guwahati (International venue)\n• Football: Assam has won Santosh Trophy multiple times\n• Kabaddi, Wrestling: Popular in rural areas\n• Elephant polo: Played in Assam\n• Traditional sports: Kati khel, Tekeli bhonga during Bihu"],
  ["assam tea history","History of Tea in Assam 🍵\n• Tea discovered by: Robert Bruce (1823, found wild plants near Sadiya)\n• First commercial plantation: 1840 at Chabua\n• Assam Tea Company: First company (1839)\n• Britain's love for tea: Largely powered by Assam tea\n• Currently: Over 800 large tea estates + thousands of small gardens\n• Employs: Over 1 million workers (including women)"],
  ["assam wildlife conservation","Wildlife Conservation in Assam 🦏\n• Rhino protection: Project Rhino — successful recovery from 600s in 1960s to 2,500+\n• Anti-poaching: Strong laws, CCTV, forest guards\n• Elephant corridors: Protected from Arunachal to Kaziranga\n• Flooding challenge: Kaziranga animals move to highlands during floods\n• Golden Langur: Only found in Assam-Bhutan border — protected"],
  ["umananda island guwahati","Umananda Island 🏝️\n• Location: Middle of Brahmaputra river, Guwahati\n• World's smallest inhabited river island\n• Has: Umananda Temple (dedicated to Lord Shiva)\n• Reached by: Boat from Kachari Ghat\n• Famous for: Golden langurs (monkeys) living on the island\n• A major tourist and pilgrimage spot in Guwahati"],
  ["assam famous personalities","Famous Personalities from Assam 🌟\n• Srimanta Sankardeva: Saint-reformer (15–16th century)\n• Lachit Borphukan: Military hero (17th century)\n• Gopinath Bordoloi: 1st CM, Bharat Ratna\n• Bhupen Hazarika: Music legend, Bharat Ratna\n• Jyoti Prasad Agarwala: First Assamese filmmaker\n• Bishnuprasad Rabha: Kalaguru\n• Hiren Gohain: Eminent scholar"],
  ["assam rivers tributaries","Tributaries of Brahmaputra in Assam 🌊\n• North bank (right): Subansiri, Jia Bharali, Dhansiri, Pagladiya, Manas, Beki, Saralbhanga, Gaurang\n• South bank (left): Burhi Dihing, Disang, Dhansiri South, Kopili, Digaru, Kulsi\n• Total catchment: All eventually drain into Brahmaputra before Bangladesh"],
  ["jorhat tea research","Tocklai Tea Research Association 🍵\n• Location: Jorhat, Assam\n• Established: 1911\n• One of the world's oldest and largest tea research stations\n• Research on: Tea breeding, cultivation, pest control, quality\n• Developed: Many popular tea varieties used across Assam"],
  ["assam famous temples","Famous Temples of Assam 🛕\n• Kamakhya Temple (Guwahati): Most famous, Shakti Peetha\n• Hayagriva Madhava Temple (Hajo): Hindu + Buddhist significance\n• Umananda Temple (Brahmaputra island)\n• Navagraha Temple (Guwahati): Nine planets temple\n• Doul Govinda Temple (Guwahati)\n• Rudreswar Temple (Sivasagar)\n• Basistha Ashram (Guwahati)"],
  ["karbi tribe assam","Karbi Tribe 🏹\n• One of the major scheduled tribes of Assam\n• Mainly in: Karbi Anglong and West Karbi Anglong\n• Language: Karbi (part of Sino-Tibetan family)\n• Festivals: Chomangkan (death ritual), Rongker (spring festival)\n• Traditional dress: Very colourful\n• Known for: Weaving, agriculture, forest skills\n• Have their own autonomous council: KAAC"],
  ["mising tribe assam","Mising Tribe 🏹\n• Also called: Miri\n• Location: Along Brahmaputra banks, Jorhat, Majuli, Dhemaji, Lakhimpur\n• Language: Mising (Tibeto-Burman family)\n• Festival: Ali-Ai-Ligang (spring festival, February)\n• Traditional dress: Ege (men), Mibu-Gaseng (women)\n• Known for: Weaving, fishing, rice cultivation, river skills"],
  ["bodo tribe assam","Bodo Tribe 🏹\n• Largest plains tribe of Assam and Northeast India\n• Location: Bodoland Territorial Region (Kokrajhar, Chirang, Baksa, Udalguri)\n• Language: Bodo (Scheduled language)\n• Festivals: Bwisagu (like Bihu — spring festival)\n• Traditional dress: Dokhona (women)\n• Bodo Peace Accord: 2020 — ended decades of insurgency"],
  ["assam traditional crafts","Traditional Crafts of Assam 🎨\n• Silk weaving: Muga, Pat, Eri silk (Sualkuchi is weaving hub)\n• Cane and bamboo: Furniture, baskets, mats\n• Bell metal: Utensils, decorative items (Hajo, Sarthebari famous)\n• Pottery: Clay pots (Assam has unique pottery tradition)\n• Mask making: For Satriya dance (made in Majuli Satras)\n• Miniature painting: Inspired by Satras"],
  ["sualkuchi assam","Sualkuchi — Manchester of Assam 🧵\n• Location: Kamrup district, Assam\n• Called: Manchester of the East (for silk weaving)\n• Famous for: Muga and Pat silk weaving\n• Every household has traditional looms\n• Silk sarees and Mekhela Sadors made here\n• Major centre of Assam's silk industry"],
  ["assam bell metal","Bell Metal — Assam Craft 🔔\n• Traditional craft of making utensils from bell metal (an alloy of copper and tin)\n• Famous centres: Sarthebari (Barpeta district), Hajo\n• Products: Jaapi stands, plates, glasses, bowls, decorative items\n• GI (Geographical Indication) tag: Assam bell metal craft\n• Used in traditional Assamese rituals and daily life"],
  ["kopou phul","Kopou Phul — Foxtail Orchid 🌸\n• State flower of Assam\n• Scientific name: Rhynchostylis retusa\n• Fragrant, light pink/white flowers\n• Worn by Assamese women in hair during Bihu festival\n• Blooms during spring (March–April) — same time as Bihu\n• Symbol of Assamese culture and femininity"],
  ["assam jaapi","Jaapi — Traditional Hat of Assam 🎩\n• Traditional conical hat of Assam\n• Made from: Bamboo strips and tokou paat (palm leaves)\n• Symbol of: Assamese identity, hospitality, and respect\n• Gifting a jaapi: A mark of great honour\n• Decorated jaapis: Used in cultural performances and decoration\n• Featured on many Assamese cultural emblems and logos"],
  ["orang national park","Orang National Park 🦏\n• Location: Darrang and Sonitpur districts, Assam\n• Also called: Mini Kaziranga (also has rhinos)\n• Area: ~78.8 sq km\n• Has: Rhinos, tigers, elephants, wild buffaloes\n• Located on north bank of Brahmaputra\n• Established as National Park: 1999"],
  ["nameri national park","Nameri National Park 🐘\n• Location: Sonitpur district, Assam\n• At the foothills of Arunachal Pradesh\n• Famous for: Elephants, tigers, birds (White-winged Wood Duck)\n• Nameri Eco Camp: Famous for birdwatching and river rafting on Jia Bhoroli river\n• Area: ~200 sq km"],
  ["assam statehood","Assam's Statehood History 🗺️\n• Assam was a separate province under British India in 1874\n• At independence (1947): Assam was a large state covering much of Northeast\n• States carved from original Assam:\n  • Nagaland: 1963\n  • Meghalaya: 1972\n  • Mizoram and Arunachal Pradesh: 1987\n• Assam's area reduced significantly through these separations"],
  ["assam natural resources","Natural Resources of Assam 🌿\n• Forests: Dense tropical forests cover ~35% of land\n• Petroleum: Assam has crude oil reserves (Digboi, Naharkatia)\n• Natural gas: Significant reserves\n• Coal: Found in Karbi Anglong and Makum coalfields\n• Limestone: Karbi Anglong area\n• Bamboo and timber: Abundant\n• Tea and silk: World-famous agri-products"],
],

  ["languages of india","India has 22 scheduled languages 🗣️\n• Official languages: Hindi and English\n• Most spoken: Hindi (44%)\n• Others: Bengali, Marathi, Tamil, Telugu, Gujarati, Urdu, Assamese..."],

  ["mother teresa","Mother Teresa was a Nobel Peace Prize winner who worked in Kolkata 🙏\n• Born: 1910 in Albania\n• Founded: Missionaries of Charity (1950)\n• Nobel Peace Prize: 1979\n• Became Indian citizen\n• Canonized as Saint (2016)"],
  ["arvind kejriwal","Arvind Kejriwal is the founder of Aam Aadmi Party (AAP) 🏛️\n• Former Chief Minister of Delhi\n• Known for: anti-corruption movement"],

  ["tiger reserve india","India has 55+ Tiger Reserves 🐯\n• Project Tiger launched: 1973\n• India has the world's largest tiger population\n• Famous reserves: Corbett, Sundarbans, Ranthambore, Manas, Kaziranga"],
  ["indian railways","Indian Railways is one of the world's largest railway networks 🚂\n• Founded: 1853 (first train: Mumbai to Thane)\n• Owns: 100,000+ km of track\n• Carries: ~23 million passengers daily"],
  ["climate of india","India has diverse climates 🌤️\n• Tropical monsoon climate predominates\n• Seasons: Summer, Monsoon (June-Sept), Post-monsoon, Winter\n• Hottest: Thar Desert (Rajasthan)\n• Coldest: Siachen Glacier"],

  ["national symbols india","National Symbols of India 🇮🇳\n• Animal: Bengal Tiger\n• Bird: Indian Peacock\n• Flower: Lotus\n• Tree: Banyan\n• Fruit: Mango\n• River: Ganga\n• Emblem: Lion Capital of Ashoka (Sarnath)\n• Anthem: Jana Gana Mana | Song: Vande Mataram"],
  ["national anthem india","National Anthem — Jana Gana Mana 🇮🇳\n• Written and composed by: Rabindranath Tagore\n• Adopted: 24 January 1950\n• Duration: 52 seconds (full version)\n• First sung: 27 December 1911 (INC session, Calcutta)\n• Five stanzas — only the first is used as anthem"],
  ["national song india","National Song — Vande Mataram 🇮🇳\n• Written by: Bankim Chandra Chattopadhyay (1882 novel 'Anandamath')\n• Meaning: I bow to thee, Mother\n• Was the rallying song of India's independence movement\n• Adopted: 24 January 1950\n• First two stanzas have equal status with national anthem"],
  ["indian constitution","Indian Constitution 📜\n• Adopted: 26 November 1949 (Constitution Day)\n• Enforced: 26 January 1950 (Republic Day)\n• Drafted by: Dr. B.R. Ambedkar (Chairperson, Drafting Committee)\n• Longest written constitution in the world\n• Originally: 395 Articles, 8 Schedules\n• Now: 448 Articles, 12 Schedules, 25 Parts"],
  ["fundamental rights india","Fundamental Rights of India 📜\n• Articles 12–35 of Constitution\n• Six Fundamental Rights:\n  1. Right to Equality (Art. 14–18)\n  2. Right to Freedom (Art. 19–22)\n  3. Right against Exploitation (Art. 23–24)\n  4. Right to Freedom of Religion (Art. 25–28)\n  5. Cultural & Educational Rights (Art. 29–30)\n  6. Right to Constitutional Remedies (Art. 32)"],
  ["preamble india","Preamble of India 📜\n• Begins: 'We, the People of India...'\n• India is: Sovereign, Socialist, Secular, Democratic, Republic\n• (Socialist and Secular added by 42nd Amendment, 1976)\n• Aims: Justice, Liberty, Equality, Fraternity"],
  ["parliament of india","Indian Parliament 🏛️\n• Bicameral legislature (two houses)\n• Lok Sabha (Lower House): 543 elected members\n• Rajya Sabha (Upper House): 245 members (233 elected + 12 nominated)\n• Located: New Delhi\n• Sessions: Budget (Feb–May), Monsoon (Jul–Aug), Winter (Nov–Dec)"],
  ["lok sabha","Lok Sabha — Lower House 🏛️\n• 543 elected seats\n• Term: 5 years (can be dissolved earlier)\n• Speaker presides over Lok Sabha\n• Members called: MPs (Member of Parliament)\n• Minimum age to contest: 25 years\n• Money bills can only be introduced here"],
  ["rajya sabha","Rajya Sabha — Upper House 🏛️\n• 245 seats (233 elected by state legislatures + 12 nominated by President)\n• Permanent house — cannot be dissolved\n• One-third members retire every 2 years\n• Each member serves 6-year term\n• Chairman: Vice President of India (ex-officio)\n• Minimum age: 30 years"],
  ["india independence","India's Independence 🇮🇳\n• Date: 15 August 1947\n• Freedom from: British colonial rule\n• Last Viceroy: Lord Mountbatten\n• First Prime Minister: Jawaharlal Nehru\n• Famous speech: 'Tryst with Destiny' by Nehru (midnight 14–15 Aug 1947)\n• Partition: India and Pakistan became separate nations"],
  ["republic day india","Republic Day — 26 January 🇮🇳\n• Celebrates: Constitution coming into force (1950)\n• Grand parade at: Kartavya Path, New Delhi\n• Chief Guest: A foreign head of state\n• National Flag hoisted by: President of India\n• Tableaux, military displays, cultural performances\n• First Republic Day: 26 January 1950"],
  ["india area facts","India — Basic Facts 🇮🇳\n• Area: 3.29 million sq km (7th largest country)\n• Population: 1.4+ billion (most populated, 2023)\n• Capital: New Delhi\n• Currency: Indian Rupee (₹)\n• Official languages: Hindi and English\n• 22 Scheduled languages\n• Borders: Pakistan, China, Nepal, Bhutan, Bangladesh, Myanmar"],
  ["india neighbour countries","India's Neighbouring Countries 🗺️\n• Pakistan: West\n• China: North\n• Nepal: North\n• Bhutan: Northeast\n• Bangladesh: East\n• Myanmar: East\n• Sri Lanka: South (across Palk Strait)\n• Maldives: South (across Indian Ocean)"],
  ["india rivers major","Major Rivers of India 🌊\n• Ganga: Longest (~2,525 km), most sacred\n• Brahmaputra: Largest by volume\n• Godavari: Longest peninsular river (Dakshin Ganga)\n• Krishna: Second longest peninsular river\n• Yamuna: Ganga's main tributary\n• Indus: J&K, then Pakistan\n• Cauvery: Sacred river of South India"],
  ["rbi india","Reserve Bank of India (RBI) 💰\n• Central bank of India\n• Established: 1 April 1935\n• Headquarters: Mumbai\n• Functions: Issues currency, controls monetary policy, regulates banks\n• Governor: Head of RBI\n• Controls: Interest rates, inflation, money supply"],
  ["india economy","Indian Economy 💰\n• 5th largest economy (GDP, 2024)\n• GDP: ~$3.7 trillion\n• Services: Largest sector (55% of GDP)\n• Fastest growing major economy (~7% growth)\n• Currency: Indian Rupee (₹)\n• Main exports: IT services, pharmaceuticals, textiles, gems"],
  ["taj mahal india","Taj Mahal 🕌\n• Location: Agra, Uttar Pradesh\n• Built by: Mughal Emperor Shah Jahan (1632–1653)\n• For: His wife Mumtaz Mahal (her tomb)\n• Material: White marble with semi-precious stone inlay\n• UNESCO World Heritage Site (1983)\n• One of the 7 Wonders of the Modern World"],
  ["india gate","India Gate 🏛️\n• Location: New Delhi\n• Built to honour: 70,000+ Indian soldiers who died in World War I\n• Built: 1931, Height: 42 metres\n• Designed by: Sir Edwin Lutyens\n• Eternal flame: Amar Jawan Jyoti (merged with National War Memorial in 2022)"],
  ["golden temple amritsar","Golden Temple (Harmandir Sahib) 🏛️\n• Location: Amritsar, Punjab\n• Most sacred shrine of Sikhism\n• Golden dome donated by: Maharaja Ranjit Singh\n• Open to people of ALL religions\n• Langar (free meals): 50,000–100,000 people fed daily!\n• Surrounded by Amrit Sarovar (pool of nectar)"],
  ["india space program","India's Space Program 🚀\n• ISRO: Indian Space Research Organisation (founded 1969)\n• Headquarters: Bengaluru\n• First satellite: Aryabhata (1975)\n• Chandrayaan-1 (2008): Found water on Moon\n• Mangalyaan (2014): First Asian Mars mission\n• Chandrayaan-3 (2023): Landed on Moon's south pole — historic!"],
  ["india railways","Indian Railways 🚂\n• 4th largest railway network in the world\n• Route length: ~68,000 km\n• Daily passengers: ~24 million\n• Trains: ~13,000 per day\n• One of world's largest employers\n• Vande Bharat Express: Semi-high speed (160–180 km/h)\n• First railway: Bombay to Thane, 1853"],
  ["india sports","Sports in India 🏏\n• National sport: Hockey (unofficial)\n• Most popular: Cricket\n• BCCI: Richest cricket board in world\n• Hockey: 8 Olympic gold medals\n• Olympics 2020 (Tokyo): 7 medals — 1 gold (Neeraj Chopra)\n• Chess: Vishwanathan Anand — 5-time World Champion"],
  ["neeraj chopra","Neeraj Chopra 🥇\n• First Indian to win Olympic gold in athletics\n• Sport: Javelin throw\n• Olympic Gold: Tokyo 2020 (87.58 m)\n• World Championship gold: 2023 (Budapest)\n• Khel Ratna Award (2021), Arjuna Award (2018)\n• Born: 24 January 1997, Panipat, Haryana"],
  ["sachin tendulkar","Sachin Tendulkar 🏏\n• Called: God of Cricket, Master Blaster\n• First to score 100 international centuries\n• ODI runs: 18,426 | Test runs: 15,921 — both world records\n• First batsman to score 200 in ODI (2010)\n• Bharat Ratna (2014) — youngest ever\n• Retired: 2013"],
  ["india festivals","Major Festivals of India 🎊\n• Diwali: Festival of lights (Hindu, Sikh, Jain)\n• Holi: Festival of colours\n• Eid: Muslim festivals (Eid-ul-Fitr, Eid-ul-Adha)\n• Christmas: Christian celebration\n• Durga Puja: West Bengal\n• Bihu: Assam | Onam: Kerala | Pongal: Tamil Nadu\n• Ganesh Chaturthi: Maharashtra | Baisakhi: Punjab"],
  ["india inventions","India's Contributions to the World 💡\n• Zero (0): Aryabhata, Brahmagupta\n• Decimal system: Ancient India\n• Chess (Chaturanga): Ancient India\n• Yoga: Ancient India\n• Ayurveda: Ancient Indian medicine\n• Value of Pi: Aryabhata (499 AD)\n• Wireless communication concept: Jagadish Chandra Bose"],
  ["mahatma gandhi india","Mahatma Gandhi 🕊️\n• Full name: Mohandas Karamchand Gandhi\n• Born: 2 October 1869, Porbandar, Gujarat\n• Methods: Non-violence (Ahimsa), Civil Disobedience, Satyagraha\n• Key events: Dandi March (1930), Quit India Movement (1942)\n• Assassinated: 30 January 1948 by Nathuram Godse\n• Birthday (2 Oct): Gandhi Jayanti, International Day of Non-Violence"],
  ["subhash chandra bose","Netaji Subhash Chandra Bose 🗡️\n• Born: 23 January 1897, Cuttack, Odisha\n• Founded: Indian National Army (INA) in 1943\n• Famous quote: 'Give me blood and I shall give you freedom!'\n• Mysterious disappearance: 18 August 1945\n• Birthday: Parakram Diwas (Courage Day)"],
  ["bhagat singh india","Bhagat Singh 🕊️\n• Born: 28 September 1907, Banga, Punjab\n• Revolutionary freedom fighter\n• Hanged: 23 March 1931 (age 23) with Rajguru and Sukhdev\n• Famous acts: Lahore Conspiracy Case, bombed Central Legislative Assembly\n• Famous quote: 'Inquilab Zindabad!' (Long Live Revolution)"],
  ["dr br ambedkar","Dr. B.R. Ambedkar 🏛️\n• Father of Indian Constitution\n• Born: 14 April 1891, Mhow, MP\n• First Law Minister of India\n• Chaired: Constitution Drafting Committee\n• Fought for: Dalit rights and social justice\n• Converted to Buddhism: 1956\n• Bharat Ratna (1990, posthumously)"],
  ["india gst","GST — Goods and Services Tax 💰\n• Implemented: 1 July 2017 ('One Nation, One Tax')\n• Replaced: VAT, excise, service tax\n• Slabs: 0%, 5%, 12%, 18%, 28%\n• Types: CGST, SGST, IGST\n• GSTN: 15-digit registration number\n• GST Council: Headed by Union Finance Minister"],
  ["indian classical dance","Classical Dances of India 💃\n• Bharatanatyam: Tamil Nadu (oldest)\n• Kathak: North India\n• Odissi: Odisha\n• Kuchipudi: Andhra Pradesh\n• Manipuri: Manipur\n• Mohiniyattam: Kerala\n• Sattriya: Assam (established by Sankardeva)\n• Kathakali: Kerala (story dance-drama)"],
  ["india awards","Major National Awards of India 🏅\n• Bharat Ratna: Highest civilian award\n• Padma Vibhushan: 2nd civilian award\n• Padma Bhushan: 3rd civilian award\n• Padma Shri: 4th civilian award\n• Param Vir Chakra: Highest military award\n• Ashoka Chakra: Highest peacetime bravery award\n• Khel Ratna: Highest sports award"],
  ["india solar energy","India's Solar Energy 🌞\n• Among world's top 5 solar energy producers\n• Installed capacity: 70+ GW (2023)\n• Largest solar park: Bhadla Solar Park, Rajasthan\n• Target: 500 GW renewable energy by 2030\n• International Solar Alliance: India's initiative (with France)"],
  ["chandragupta maurya india","Chandragupta Maurya 👑\n• Founded: Maurya Empire ~322 BCE\n• Advised by: Chanakya\n• Unified most of Indian subcontinent for first time\n• Defeated: Dhana Nanda and Seleucus I\n• Capital: Pataliputra (modern Patna)\n• Later became Jain monk"],
  ["ashoka emperor","Emperor Ashoka 👑\n• 3rd Maurya Emperor (~268–232 BCE)\n• After Battle of Kalinga (262 BCE): Converted to Buddhism\n• Spread Buddhism across Asia\n• Erected Ashokan Pillars — Lion Capital = India's national emblem\n• Policy: Dhamma (non-violence, tolerance, righteousness)"],
  ["mughal empire india","Mughal Empire 👑\n• Founded: 1526 by Babur (Battle of Panipat)\n• Major Emperors: Babur, Humayun, Akbar, Jahangir, Shah Jahan, Aurangzeb\n• Greatest extent: Under Aurangzeb\n• Built: Taj Mahal, Red Fort, Fatehpur Sikri, Agra Fort\n• Declined: After Aurangzeb's death (1707)"],
  ["india census","India Census 📊\n• Census conducted every 10 years\n• Last completed: 2011 Census\n• 2011 population: 1.21 billion\n• Sex ratio (2011): 943 females per 1000 males\n• Literacy rate (2011): 74.04%\n• Most literate state: Kerala (94%)\n• Most populated state: Uttar Pradesh"],
  ["ajanta ellora caves","Ajanta and Ellora Caves 🏛️\n• Ajanta (Maharashtra): Buddhist rock-cut caves (2nd century BC–6th century AD)\n  • Famous for: Paintings of Buddha's life\n• Ellora (Maharashtra): Hindu, Buddhist, Jain caves\n  • Kailash Temple (Cave 16): World's largest monolithic rock-cut temple\n• Both are UNESCO World Heritage Sites"],
  ["india defence","Indian Armed Forces 🎖️\n• Supreme Commander: President of India\n• Three wings: Army, Navy, Air Force\n• Indian Army: One of world's largest (~1.4 million active)\n• Nuclear capability: India declared 1998 (Pokhran-II)\n• India is world's 4th most powerful military (Global Firepower)"],
  ["india wonders","Wonders and Heritage of India 🏛️\n• UNESCO World Heritage Sites in India: 42 (as of 2023)\n• Cultural: Taj Mahal, Red Fort, Ajanta Caves, Hampi, Khajuraho\n• Natural: Kaziranga, Sundarbans, Western Ghats, Great Himalayan NP\n• Intangible: Yoga, Vedic chanting, Ramlila, Kumbh Mela, Satriya dance"],
  ["india languages","Indian Languages 🗣️\n• 22 languages in Schedule 8 of Constitution\n• Hindi: Most spoken (~44% population)\n• 122 major languages, 1,500+ dialects\n• Classical languages: Sanskrit, Tamil, Telugu, Kannada, Malayalam, Odia\n• English: Co-official language\n• Most linguistically diverse large nation"],
  ["rabindranath tagore","Rabindranath Tagore 📜\n• Born: 7 May 1861, Kolkata\n• First Asian Nobel Prize winner — Literature (1913) for 'Gitanjali'\n• Wrote: India's national anthem 'Jana Gana Mana'\n• Also wrote: Bangladesh's 'Amar Sonar Bangla'\n• Founded: Visva-Bharati University, Shantiniketan (1921)\n• Died: 7 August 1941"],
  ["cv raman india","C.V. Raman 🔬\n• Full name: Sir Chandrasekhara Venkata Raman\n• Nobel Prize in Physics: 1930\n• Discovery: Raman Effect (light scattering in transparent medium)\n• First Asian to win Nobel in Science\n• National Science Day: 28 February (anniversary of Raman Effect, 1928)\n• Bharat Ratna: 1954"],
  ["india first prime minister","Jawaharlal Nehru — First PM of India 🏛️\n• Term: 1947–1964 (17 years — longest serving PM)\n• Called: Pandit Nehru, Chacha Nehru\n• Father of Indira Gandhi\n• Built India's scientific, industrial, and democratic foundations\n• Birthday: 14 November = Children's Day (Bal Diwas)"],
  ["indira gandhi pm","Indira Gandhi 🏛️\n• India's first and only woman Prime Minister\n• Terms: 1966–1977, 1980–1984\n• Daughter of Jawaharlal Nehru\n• Led India in 1971 Bangladesh Liberation War\n• Bharat Ratna (1971)\n• Assassinated: 31 October 1984"],
  ["india high courts","High Courts of India 🏛️\n• India has 25 High Courts\n• Each state/UT has a High Court\n• Highest court in state\n• Calcutta HC: Oldest (established 1862)\n• Gauhati HC: Covers Assam, Nagaland, Mizoram, Arunachal Pradesh\n• Supreme Court: Ultimate court of the land (New Delhi)"],
  ["india geography overview","Geography of India 🗺️\n• Located in: South Asia\n• Area: 3.29 million sq km (7th largest)\n• Has: Himalayas (north), Plains (centre), Deccan Plateau (south), Desert (northwest), Coastal plains\n• India is a peninsula — surrounded by sea on three sides\n• Largest state by area: Rajasthan\n• Smallest state by area: Goa"],
  ["india water bodies","Important Water Bodies of India 🌊\n• Seas: Arabian Sea (west), Bay of Bengal (east), Indian Ocean (south)\n• Largest freshwater lake: Wular Lake, J&K\n• Largest saltwater lake: Chilika Lake, Odisha\n• Highest lake: Cholamu Lake, Sikkim\n• Largest lagoon: Chilika Lake, Odisha\n• Largest artificial lake: Govind Ballabh Pant Sagar, MP"],
  ["india bharat ratna list","Notable Bharat Ratna Recipients 🏅\n• Dr. Sarvepalli Radhakrishnan (1954) — 1st recipient\n• C.V. Raman (1954)\n• Indira Gandhi (1971)\n• Mother Teresa (1980)\n• Dr. B.R. Ambedkar (1990, posthumous)\n• Nelson Mandela (1990)\n• Sachin Tendulkar (2014) — first sportsperson\n• A.P.J. Abdul Kalam (1997)\n• Narendra Modi (2024)"],
  ["india important ports","Major Ports of India 🚢\n• Mumbai: Largest port on west coast\n• Chennai: Major port on east coast\n• Kolkata: Oldest and major inland port\n• Visakhapatnam: Largest port by cargo tonnage\n• Kochi: Natural harbour, west coast\n• Kandla (Deendayal): Gujarat\n• Paradip: Odisha"],
  ["india dams","Major Dams of India 🏗️\n• Tehri Dam: Uttarakhand — tallest in India (~260 m)\n• Bhakra Nangal: Punjab/Himachal — on Satluj river\n• Hirakud: Odisha — one of longest earthen dams in world\n• Sardar Sarovar: Gujarat — on Narmada river\n• Nagarjuna Sagar: Telangana/AP — on Krishna river\n• Tungabhadra: Karnataka"],
  ["india nuclear program","India's Nuclear Program ☢️\n• India declared nuclear state: 1998 (Pokhran-II tests)\n• First test: 1974 (Pokhran-I — 'Smiling Buddha')\n• Policy: No-First-Use of nuclear weapons\n• 'Father of India's nuclear program': Dr. Homi J. Bhabha\n• BARC: Bhabha Atomic Research Centre (Mumbai)\n• DAE: Department of Atomic Energy"],
  ["india independence movement","India's Independence Movement 🇮🇳\n• Started: 1857 (First War of Independence)\n• Indian National Congress: Founded 1885\n• Key movements: Swadeshi (1905), Non-Cooperation (1920), Civil Disobedience (1930), Quit India (1942)\n• Leaders: Gandhi, Nehru, Bose, Tilak, Patel, Ambedkar\n• Independence: 15 August 1947"],
  ["sardar patel india","Sardar Vallabhbhai Patel 🏛️\n• First Deputy PM and Home Minister of India\n• Called: Iron Man of India\n• Merged 562 princely states into India after independence\n• Born: 31 October 1875, Nadiad, Gujarat\n• Died: 15 December 1950\n• Statue of Unity: World's tallest statue (182 m) built in his honour\n• Birthday (31 Oct): Rashtriya Ekta Diwas (National Unity Day)"],
  ["statue of unity","Statue of Unity 🗿\n• World's tallest statue: 182 metres\n• Location: Kevadia, Gujarat (near Sardar Sarovar Dam)\n• Dedicated to: Sardar Vallabhbhai Patel\n• Inaugurated: 31 October 2018 by PM Narendra Modi\n• Built in: Just 33 months (record time)\n• Twice the height of the Statue of Liberty!"],
  ["india tiger project","Project Tiger — India 🐯\n• Launched: 1 April 1973 by PM Indira Gandhi\n• Goal: Protect Bengal Tigers from extinction\n• In 1973: Only ~1,800 tigers in India\n• In 2023: ~3,682 tigers (53% of world's wild tigers!)\n• Tiger reserves in India: 53\n• Biggest reserve: Nagarjuna Sagar-Srisailam (AP)\n• India is the greatest tiger conservation success story"],
  ["india project elephant","Project Elephant — India 🐘\n• Launched: 1992\n• Goal: Protect elephants, habitats, and corridors\n• India has: ~29,000+ wild elephants (60% of world's Asian elephants)\n• Elephant reserves: 32 in India\n• State animal: Kerala (largest elephant population in south)\n• Elephant is also the emblem of many Indian institutions"],
  ["first india achievements","India's Firsts 🏆\n• First Indian in space: Rakesh Sharma (1984, Soviet mission)\n• First Indian woman in space: Kalpana Chawla (1997, NASA)\n• First Indian to climb Everest: Tenzing Norgay (1953)\n• First Indian woman to climb Everest: Bachendri Pal (1984)\n• First atomic bomb test: 1974 (Pokhran-I)\n• First satellite: Aryabhata (1975)\n• First Moon mission: Chandrayaan-1 (2008)"],
  ["lok pal india","Lokpal of India 🏛️\n• An anti-corruption ombudsman for India\n• Established under: Lokpal and Lokayuktas Act, 2013\n• First Lokpal: Justice Pinaki Chandra Ghose (2019)\n• Function: Inquire into corruption allegations against public servants including PM\n• Similar to: Ombudsman in Scandinavian countries\n• State equivalent: Lokayukta"],
  ["panchayati raj india","Panchayati Raj System 🏘️\n• System of rural local self-governance\n• Three tiers:\n  1. Gram Panchayat (village level)\n  2. Panchayat Samiti (block level)\n  3. Zila Parishad (district level)\n• Established by: 73rd Constitutional Amendment (1992)\n• About 2.5 lakh Gram Panchayats in India\n• 33% seats reserved for women"],
  ["india famous scientists","Famous Scientists of India 🔬\n• C.V. Raman: Nobel Prize in Physics (1930)\n• Homi J. Bhabha: Father of India's nuclear program\n• Vikram Sarabhai: Father of India's space program\n• A.P.J. Abdul Kalam: Missile Man of India\n• Jagadish Chandra Bose: Pioneer in wireless communication\n• S.N. Bose: Bose-Einstein statistics (Boson particles named after him)"],
  ["indian ocean name","Why is it called the Indian Ocean? 🌊\n• Named after: India — which dominates its northern coastline\n• India is the only country with an ocean named after it\n• This reflects India's historical importance in maritime trade\n• India controlled major spice and silk sea routes\n• The ocean was known to ancient sailors as the 'Sea of India'"],
  ["india topography","India's Topography — Physical Features 🗺️\n• The Himalayas: Northern mountain wall\n• The Northern Plains: Most fertile, most populated\n• The Peninsular Plateau: Deccan Plateau — ancient, stable\n• The Coastal Plains: East (Coromandel) and West (Konkan, Malabar)\n• The Thar Desert: Rajasthan — hot, arid\n• The Islands: Andaman & Nicobar (east), Lakshadweep (west)"],
  ["india wildlife sanctuaries","Important Wildlife Sanctuaries of India 🐅\n• Jim Corbett NP: Uttarakhand — first national park (1936), tigers\n• Ranthambore NP: Rajasthan — tigers\n• Gir Forest NP: Gujarat — last home of Asiatic Lions\n• Sundarbans: West Bengal — Royal Bengal Tiger, mangroves\n• Periyar NP: Kerala — elephants, tigers\n• Kaziranga NP: Assam — one-horned rhinos\n• Kanha NP: Madhya Pradesh — inspiration for Jungle Book"],
